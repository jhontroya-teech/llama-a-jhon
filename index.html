<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Llama a Jhon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
body{font-family:sans-serif;background:#f5f5f5;max-width:430px;margin:0 auto;padding:1rem;}
.header-box{background:#fff;padding:1rem;border-radius:16px;margin-bottom:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.stats-container{display:flex;gap:10px;margin-bottom:1rem;}
.stat-card{flex:1;background:#f8f9fa;padding:15px;border-radius:12px;text-align:center;}
.stat-number{font-size:24px;font-weight:700;}
.stat-label{font-size:12px;color:#666;}
.client-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 5px rgba(0,0,0,0.05);}
.fab{position:fixed;bottom:2rem;right:2rem;background:#1a1a1a;color:#fff;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 4px 10px rgba(0,0,0,0.3);}
</style>
</head>
<body>

<div class="header-box">
  <div class="header-top">
    <h1 style="font-size:18px;"><i class="ti ti-tool"></i> Llama a Jhon</h1>
    <i class="ti ti-refresh" onclick="fetchDataFromSheets()"></i>
  </div>
  <div class="stats-container">
    <div class="stat-card"><div class="stat-number" id="count-clients">0</div><div class="stat-label">Clientes</div></div>
    <div class="stat-card"><div class="stat-number" id="count-services">0</div><div class="stat-label">Servicios</div></div>
  </div>
</div>

<div id="client-list"></div>
<div class="fab" onclick="addClientPrompt()">+</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxnEO3E0duFo0kaZgeJwg-zLLPXqiiOLGiHLhsPqQxCgBqeWU0pMNYri27yduNbfe3npA/exec';
let db = {clients:[], visits:[]};

function fetchDataFromSheets() {
  fetch(SHEET_URL).then(res => res.json()).then(data => {
    db = data;
    render();
  });
}

function render() {
  document.getElementById('count-clients').textContent = db.clients.length;
  document.getElementById('count-services').textContent = db.visits.length;
  
  const list = document.getElementById('client-list');
  list.innerHTML = db.clients.map(c => {
    const vCount = db.visits.filter(v => v.ClienteID == c.ID).length;
    return `
    <div class="client-card">
      <div style="font-weight:700; font-size:16px;">${c.Nombre}</div>
      <div style="font-size:13px; color:#666; margin-top:5px;">
        <i class="ti ti-phone"></i> ${c.Teléfono || '—'}<br>
        <i class="ti ti-map-pin"></i> ${c.Dirección || '—'}
      </div>
      <div style="margin-top:8px; font-weight:bold; color:#4a90e2; font-size:13px;">${c.Tipo} | ${vCount} servicios</div>
    </div>`;
  }).join('');
}

function addClientPrompt() {
  const nombre = prompt("Nombre del nuevo cliente:");
  if(nombre) {
    const nuevo = {type:'client', ID: 'c_' + Date.now(), Nombre: nombre};
    fetch(SHEET_URL, {method: 'POST', body: JSON.stringify(nuevo)}).then(() => alert("Agregado. ¡Refresca la app!"));
  }
}

fetchDataFromSheets();
</script>
</body>
</html>
