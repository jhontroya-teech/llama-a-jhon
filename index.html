<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Llama a Jhon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  body{font-family:sans-serif;background:#f5f5f5;max-width:430px;margin:0 auto;padding:1rem;}
  .screen{display:none;}
  .screen.active{display:block;}
  .client-card{background:#fff;padding:15px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd;cursor:pointer;}
  #login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;display:flex;justify-content:center;align-items:center;z-index:999;}
  .login-box{background:#fff;padding:25px;border-radius:15px;width:90%;}
  .user-btn{width:100%;padding:12px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd;cursor:pointer;background:#fff;}
  .user-btn.selected{background:#1a1a1a;color:#fff;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h3 style="text-align:center;">Selecciona tu Empresa</h3>
    <button class="user-btn" id="btn-jhon" onclick="selectUser('jhon')">🔧 Llama a Jhon</button>
    <button class="user-btn" id="btn-thermo" onclick="selectUser('thermo')">❄️ Thermoelectric</button>
    <input type="password" id="login-pass" placeholder="Contraseña" style="width:100%;padding:12px;margin-bottom:10px;border:1px solid #ddd;border-radius:10px;">
    <button onclick="checkLogin()" style="width:100%;padding:13px;background:#000;color:#fff;border-radius:10px;border:none;cursor:pointer;">Ingresar</button>
  </div>
</div>

<div id="screen-home" class="screen">
  <h1 id="home-title">Cargando...</h1>
  <div id="sync-status" style="font-size:12px;color:#666;">Conectando...</div>
  <div id="client-list" style="margin-top:20px;"></div>
</div>

<script>
const USERS = {
  jhon: { 
    pass: 'jhon2024', 
    label: 'Llama a Jhon', 
    sheetUrl: 'https://script.google.com/macros/s/AKfycbzPPsb_-DuMrnwcYBwAYR81c6zo_s7HVOpuQHAy3VbhHc8Y_D97MKP28RKt5w1gpql_xQ/exec' 
  },
  thermo: { 
    pass: 'thermo2024', 
    label: 'Thermoelectric', 
    sheetUrl: 'https://script.google.com/macros/s/AKfycbzePKw2vbFId4-wePXANI6soNGNtGXyMAsje5lIUP3ju3iAke37o6C6PSr4h2x9GI-8/exec' 
  }
};

let currentUser = null, selectedKey = null, db = {clients:[]};

function selectUser(k){ 
  selectedKey = k; 
  document.getElementById('btn-jhon').className = (k==='jhon' ? 'user-btn selected' : 'user-btn');
  document.getElementById('btn-thermo').className = (k==='thermo' ? 'user-btn selected' : 'user-btn');
}

function checkLogin(){
  if(!selectedKey || document.getElementById('login-pass').value !== USERS[selectedKey].pass){ alert('Contraseña incorrecta'); return; }
  currentUser = USERS[selectedKey];
  document.getElementById('login-screen').style.display='none';
  document.getElementById('home-title').textContent = currentUser.label;
  loadData();
}

function loadData(){
  document.getElementById('sync-status').textContent = "Sincronizando...";
  fetch(currentUser.sheetUrl + '?action=readAll')
    .then(r => r.json())
    .then(data => {
      db = data;
      localStorage.setItem('db_' + selectedKey, JSON.stringify(db));
      document.getElementById('sync-status').textContent = "✅ Sincronizado";
      renderClients();
    })
    .catch(e => {
      document.getElementById('sync-status').textContent = "⚠️ Error de conexión";
      console.error(e);
    });
}

function renderClients(){
  const list = document.getElementById('client-list');
  if(!db.clients || db.clients.length === 0) { list.innerHTML = "No se encontraron clientes en este Excel."; }
  else {
    list.innerHTML = db.clients.map(c => `
      <div class="client-card">
        <h3>${c.nombre || 'Sin nombre'}</h3>
        <p>${c.telefono || 'Sin teléfono'}</p>
      </div>
    `).join('');
  }
  document.getElementById('screen-home').classList.add('active');
}
</script>
</body>
</html>
