<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Llama a Jhon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;max-width:430px;margin:0 auto;min-height:100vh;}
.screen{display:none;padding:1rem;padding-bottom:5rem;}
.screen.active{display:block;}
.header{display:flex;align-items:center;gap:10px;background:#fff;margin:-1rem -1rem 1.5rem;padding:1rem;position:sticky;top:0;z-index:10;border-bottom:1px solid #e5e5e5;}
.header h1{font-size:18px;font-weight:600;color:#1a1a1a;flex:1;}
/* ... (Todo tu CSS previo está aquí implícito) ... */
.checkbox-item{display:flex;align-items:center;gap:10px;background:#fffaf0;border:1px solid #ffe8cc;border-radius:10px;padding:10px 14px;}
</style>
</head>
<body>

<div id="login-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;z-index:9999;display:flex;justify-content:center;align-items:center;">
  <div class="login-box" style="background:#fff;padding:30px;border-radius:14px;width:85%;">
    <h2 style="margin-bottom:20px;text-align:center;">Selecciona Empresa</h2>
    <div class="user-selector" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
      <button class="user-btn" id="btn-jhon" onclick="selectUser('jhon')" style="padding:10px;border-radius:10px;">🔧 Jhon</button>
      <button class="user-btn" id="btn-thermo" onclick="selectUser('thermo')" style="padding:10px;border-radius:10px;">❄️ Thermo</button>
    </div>
    <input type="password" id="login-pass" placeholder="Contraseña" style="width:100%;padding:12px;margin-bottom:15px;border:1px solid #ddd;border-radius:10px;">
    <button onclick="checkLogin()" style="width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-weight:bold;">Ingresar</button>
  </div>
</div>

<div id="screen-home" class="screen">
  <div class="header">
    <div id="home-logo" style="width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;background:#1a1a1a;"></div>
    <h1 id="home-title">Negocio</h1>
    <i class="ti ti-user-circle" style="font-size:24px;cursor:pointer;" onclick="switchUser()"></i>
  </div>
  <div id="client-list"></div>
  <button class="fab" onclick="goNewClient()">+</button>
</div>

<div id="screen-new-visit" class="screen">
  <div class="header"><h1 id="new-visit-title">Nueva visita</h1></div>
  
  <div class="section-title">Información</div>
  <input type="date" id="v-fecha">
  <select id="v-tipo">
    <option value="">Tipo de servicio</option>
    <option>Instalación</option><option>Limpieza</option><option>Revisión técnica</option>
    <option>Fuga de gas</option><option>Mantenimiento preventivo</option><option>Reparación</option><option>Otro</option>
  </select>

  <div class="section-title">Detalle del equipo</div>
  <textarea id="v-detalle"></textarea>
  <div class="section-title">Observación</div>
  <textarea id="v-observacion"></textarea>
  <div class="section-title">Fotos</div>
  <div id="photo-grid"></div>
  <input type="file" id="photo-input" style="display:none" onchange="addPhotos(this)">
  
  <div class="section-title">Responsabilidad</div>
  <div class="checkbox-item">
    <input type="checkbox" id="v-deslinde-check" required>
    <label for="v-deslinde-check">He sido informado de los riesgos técnicos y, bajo mi propia voluntad, acepto la responsabilidad absoluta sobre los daños o fallas que puedan derivarse de esta instalación o servicio.</label>
  </div>

  <div class="section-title">Firma del cliente</div>
  <canvas id="sigCanvas"></canvas>
  <button onclick="saveVisit()" class="btn-primary">Guardar visita</button>
</div>

<script>
// LÓGICA MANTENIDA Y RECONECTADA
const USERS = {
  jhon: { pass:'jhon2024', label:'Llama a Jhon', color:'#1a4a9a', icon:'ti-tool', sheetUrl:'https://script.google.com/macros/s/AKfycbzP4714lVYGCS3N992eIonN2o2spXKGvIl4i2tHo---PuGhBhjcHWWDqt7c5_czatf6/exec' },
  thermo:{ pass:'thermo2024', label:'Thermoelectric', color:'#9a4a1a', icon:'ti-snowflake', sheetUrl:'https://script.google.com/macros/s/AKfycbzePKw2vbFId4-wePXANI6soNGNtGXyMAsje5lIUP3ju3iAke37o6C6PSr4h2x9GI-8/exec' }
};

let currentUser = null, selectedUserKey = null, db = {clients:[], visits:[]};

function selectUser(key){
  selectedUserKey = key;
  document.querySelectorAll('.user-btn').forEach(b=>b.style.background='#fff');
  document.getElementById('btn-'+key).style.background='#ddd';
}

function checkLogin(){
  const pass = document.getElementById('login-pass').value;
  if(selectedUserKey && USERS[selectedUserKey].pass === pass){
    currentUser = USERS[selectedUserKey];
    // Restaurar carga de datos original
    db = JSON.parse(localStorage.getItem('lj_db_'+selectedUserKey) || '{"clients":[],"visits":[]}');
    document.getElementById('login-screen').style.display='none';
    document.getElementById('screen-home').classList.add('active');
    
    // Restaurar UI del Header
    document.getElementById('home-title').textContent = currentUser.label;
    document.getElementById('home-logo').style.background = currentUser.color;
    document.getElementById('home-logo').innerHTML = `<i class="ti ${currentUser.icon}"></i>`;
    renderClients();
  } else { alert('Contraseña incorrecta'); }
}

function switchUser(){ location.reload(); }

function saveVisit(){
  if(!document.getElementById('v-deslinde-check').checked){ alert('Debes aceptar la responsabilidad'); return; }
  // ... (tu lógica original de guardado permanece igual)
}
// [IMPORTANTE: ASEGÚRATE DE MANTENER EL RESTO DE TU SCRIPT ORIGINAL QUE NO COPIÉ AQUÍ PARA QUE TODO SIGA FUNCIONANDO]
</script>
</body>
</html>
