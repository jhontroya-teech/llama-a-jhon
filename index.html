<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Llama a Jhon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
/* CSS INTEGRADO - MANTENGO TUS DISEÑOS ORIGINALES */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;max-width:430px;margin:0 auto;min-height:100vh;}
.screen{display:none;padding:1rem;padding-bottom:5rem;}
.screen.active{display:block;}
.header{display:flex;align-items:center;gap:10px;background:#fff;margin:-1rem -1rem 1.5rem;padding:1rem;position:sticky;top:0;z-index:10;border-bottom:1px solid #e5e5e5;}
.header h1{font-size:18px;font-weight:600;color:#1a1a1a;flex:1;}
.section-title{font-size:12px;color:#888;font-weight:600;text-transform:uppercase;margin-top:1.25rem;margin-bottom:8px;}
input,textarea,select{width:100%;padding:11px;border:1px solid #ddd;border-radius:10px;margin-bottom:10px;}
.btn-primary{width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-weight:600;cursor:pointer;}
#login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;z-index:9999;display:flex;justify-content:center;align-items:center;}
.login-box{background:#fff;padding:30px;border-radius:14px;width:90%;max-width:350px;}
.checkbox-item{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px;margin-bottom:15px;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2 style="margin-bottom:20px;text-align:center;">Selecciona Empresa</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
      <button onclick="selectUser('jhon')" id="btn-jhon" style="padding:10px;border-radius:10px;cursor:pointer;">🔧 Jhon</button>
      <button onclick="selectUser('thermo')" id="btn-thermo" style="padding:10px;border-radius:10px;cursor:pointer;">❄️ Thermo</button>
    </div>
    <input type="password" id="login-pass" placeholder="Contraseña">
    <button class="btn-primary" onclick="checkLogin()">Ingresar</button>
  </div>
</div>

<div id="screen-home" class="screen">
  <div class="header"><h1 id="home-title">Cargando...</h1></div>
  <div id="client-list"></div>
</div>

<div id="screen-new-visit" class="screen">
  <div class="header"><h1>Nueva visita</h1></div>
  <input type="date" id="v-fecha">
  <select id="v-tipo">
    <option value="">Tipo de servicio</option>
    <option>Instalación</option><option>Limpieza</option><option>Revisión técnica</option>
    <option>Fuga de gas</option><option>Reparación</option>
  </select>
  <textarea id="v-detalle" placeholder="Detalle"></textarea>
  <div class="section-title">Responsabilidad</div>
  <label class="checkbox-item"><input type="checkbox" id="v-deslinde"><span>Acepto responsabilidad absoluta.</span></label>
  <button class="btn-primary" onclick="saveVisit()">Guardar</button>
</div>

<script>
const USERS = {
  jhon:  { pass:'jhon2024', label:'Llama a Jhon', sheetUrl:'https://script.google.com/macros/s/AKfycbzP4714lVYGCS3N992eIonN2o2spXKGvIl4i2tHo---PuGhBhjcHWWDqt7c5_czatf6/exec' },
  thermo:{ pass:'thermo2024', label:'Thermoelectric', sheetUrl:'https://script.google.com/macros/s/AKfycbzePKw2vbFId4-wePXANI6soNGNtGXyMAsje5lIUP3ju3iAke37o6C6PSr4h2x9GI-8/exec' }
};

let currentUser = null, selectedKey = null, db = {clients:[], visits:[]};

function selectUser(k){ selectedKey = k; document.getElementById('btn-jhon').style.background = k==='jhon'?'#ddd':'#fff'; document.getElementById('btn-thermo').style.background = k==='thermo'?'#ddd':'#fff'; }

function checkLogin(){
  if(!selectedKey || document.getElementById('login-pass').value !== USERS[selectedKey].pass){ alert('Error de login'); return; }
  currentUser = USERS[selectedKey];
  document.getElementById('login-screen').style.display='none';
  document.getElementById('home-title').textContent = currentUser.label;
  loadData();
}

function loadData(){
  fetch(currentUser.sheetUrl + '?action=readAll')
    .then(r => r.json())
    .then(data => { db = data; document.getElementById('screen-home').classList.add('active'); });
}

function saveVisit(){
  if(!document.getElementById('v-deslinde').checked){ alert('Debes aceptar la responsabilidad'); return; }
  // Aquí va tu lógica de guardado
  alert('Guardado en ' + currentUser.label);
}
</script>
</body>
</html>
