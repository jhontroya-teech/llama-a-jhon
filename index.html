<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llama a Jhon - Sistema Oficial</title>
    <style>
        body { font-family: sans-serif; max-width: 430px; margin: auto; padding: 20px; background: #f9f9f9; }
        .screen { display: none; }
        .active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        canvas { border: 1px solid #000; width: 100%; height: 150px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="screen-login" class="screen active card">
    <h2>Llama a Jhon</h2>
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
</div>

<div id="screen-visit" class="screen card">
    <h1>Nueva visita</h1>
    <input type="date" id="fecha">
    <select id="tipo"><option>Instalación</option><option>Reparación</option><option>Limpieza</option></select>
    <textarea id="obs" placeholder="Detalle del equipo..."></textarea>
    
    <label><input type="checkbox" id="acepto"> Yo como cliente acepto responsabilidad</label>
    
    <p>Fotos:</p>
    <input type="file" id="fotos" multiple>
    
    <p>Firma del cliente:</p>
    <canvas id="firma"></canvas>
    
    <button id="btn-save" onclick="guardarVisita()">Guardar visita</button>
    
    <div id="btns-finales" style="display:none;">
        <button onclick="alert('Reporte compartido')">Compartir reporte</button>
        <button onclick="location.reload()">Inicio</button>
    </div>
</div>

<script>
    const URL = 'https://script.google.com/macros/s/AKfycbyC5V4bP6ss4iZdugupMJDU2GKzVK4DaJrynmpp4J3sA0ImcopK96s1TARxsz8DKzIG-w/exec';
    
    function login() {
        if(document.getElementById('pass').value === 'jhon2024') {
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-visit').classList.add('active');
        } else alert('Clave incorrecta');
    }

    async function guardarVisita() {
        if(!document.getElementById('acepto').checked) { alert('Acepta la responsabilidad'); return; }
        
        let btn = document.getElementById('btn-save');
        btn.disabled = true;
        btn.textContent = 'Guardando...';

        // Enviar datos
        let params = new URLSearchParams({
            fecha: document.getElementById('fecha').value,
            tipo: document.getElementById('tipo').value
        });
        
        await fetch(URL + '?' + params);

        // Bloqueo y muestra de botones finales
        btn.style.display = 'none';
        document.getElementById('btns-finales').style.display = 'block';
    }
</script>
</body>
</html>
