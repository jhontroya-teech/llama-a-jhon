<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Llama a Jhon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
body{font-family:sans-serif;background:#f5f5f5;max-width:430px;margin:0 auto;padding:1rem;}
.header-box{background:#fff;padding:1.2rem;border-radius:20px;box-shadow:0 4px 10px rgba(0,0,0,0.05);margin-bottom:1rem;}
.search-box{margin-bottom:1rem;position:relative;}
.search-box input{width:100%;padding:12px 15px 12px 40px;border-radius:12px;border:1px solid #ddd;font-size:16px;}
.search-box i{position:absolute;left:15px;top:13px;color:#aaa;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.stat-card{background:#f8f9fa;padding:10px;border-radius:12px;text-align:center;}
.client-card{background:#fff;padding:16px;border-radius:14px;margin-bottom:10px;box-shadow:0 2px 5px rgba(0,0,0,0.05);}
.fab{position:fixed;bottom:2rem;right:2rem;background:#1a1a1a;color:#fff;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:25px;}
</style>
</head>
<body>

<div class="header-box">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h2 style="font-size:18px;"><i class="ti ti-tool"></i> Llama a Jhon</h2>
    <i class="ti ti-refresh" onclick="fetchDataFromSheets()" style="cursor:pointer;"></i>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div id="count-clients" style="font-weight:bold;">0</div><small>Clientes</small></div>
    <div class="stat-card"><div id="count-services" style="font-weight:bold;">0</div><small>Servicios</small></div>
  </div>
</div>

<div class="search-box">
  <i class="ti ti-search"></i>
  <input type="text" id="search-input" placeholder="Buscar por nombre o detalle..." oninput="render()">
</div>

<div id="client-list"></div>
<div class="fab" onclick="addClientPrompt()">+</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxnEO3E0duFo0kaZgeJwg-zLLPXqiiOLGiHLhsPqQxCgBqeWU0pMNYri27yduNbfe3npA/exec';
let db = {clients:[], visits:[]};

function fetchDataFromSheets() {
  fetch(SHEET_URL).then(res => res.json()).then(data => { db = data; render(); });
}

function render() {
  const q = document.getElementById('search-input').value.toLowerCase();
  document.getElementById('count-clients').textContent = db.clients.length;
  document.getElementById('count-services').textContent = db.visits.length;
  
  const list = document.getElementById('client-list');
  list.innerHTML = db.clients.filter(c => {
    const v = db.visits.filter(vis => vis.ClienteID == c.ID && vis.Observación.toLowerCase().includes(q));
    return c.Nombre.toLowerCase().includes(q) || v.length > 0;
  }).map(c => `
    <div class="client-card" onclick="viewClientReports('${c.ID}')">
      <div style="font-weight:700;">${c.Nombre}</div>
      <div style="font-size:13px; color:#666;">${c.Tipo} | ${db.visits.filter(v => v.ClienteID == c.ID).length} servicios</div>
    </div>`).join('');
}

function viewClientReports(id) {
  const reports = db.visits.filter(v => v.ClienteID == id);
  let msg = "HISTORIAL Y REPORTES:\n\n" + reports.map(r => 
    `📅 ${r.Fecha}: ${r.Tipo}\n📝 ${r.Observación}\n📸 Foto: ${r.FotoURL || 'Sin foto'}`).join('\n\n---\n\n');
  alert(msg || "No hay servicios.");
}

function addClientPrompt() {
  const nombre = prompt("Nombre del nuevo cliente:");
  if(nombre) {
    const nuevo = {type:'client', ID: 'c_' + Date.now(), Nombre: nombre, Teléfono: '', Dirección: '', Tipo: 'Split', Marca: 'N/A', BTU: '0'};
    fetch(SHEET_URL, {method: 'POST', body: JSON.stringify(nuevo)}).then(() => { alert("Agregado. Refresca."); });
  }
}

fetchDataFromSheets();
</script>
</body>
</html>
