<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión HVAC - Jhon</title>
    <style>
        body { font-family: sans-serif; max-width: 430px; margin: auto; padding: 20px; background: #f4f4f9; }
        .screen { display: none; }
        .active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        canvas { border: 2px dashed #ccc; width: 100%; height: 150px; margin-top: 10px; background: #fff; }
    </style>
</head>
<body>

<!-- PANTALLA 1: LOGIN -->
<div id="screen-login" class="screen active card">
    <h2>Sistema de Clientes</h2>
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
</div>

<!-- PANTALLA 2: LISTA DE CLIENTES Y VISITAS -->
<div id="screen-home" class="screen card">
    <h1>Clientes y Visitas</h1>
    <div id="lista-datos">
        <p>• Víctor (HVAC - Mantenimiento)</p>
        <p>• Cliente Residencial (Guayaquil)</p>
    </div>
    <button onclick="goScreen('screen-visit')">+ Nueva Visita</button>
</div>

<!-- PANTALLA 3: NUEVA VISITA -->
<div id="screen-visit" class="screen card">
    <h1>Nueva Visita</h1>
    <input type="date" id="fecha">
    <select id="tipo"><option>Instalación</option><option>Limpieza</option><option>Reparación</option></select>
    <textarea id="obs" placeholder="Detalle técnico..."></textarea>
    <label><input type="checkbox" id="acepto"> Yo como cliente acepto responsabilidad</label>
    <input type="file" id="fotos" multiple>
    <canvas id="firma"></canvas>
    
    <button id="btn-save" onclick="guardar()">Guardar Visita</button>
    <div id="btns-finales" style="display:none; margin-top:10px;">
        <button onclick="alert('Reporte enviado al cliente')">Compartir reporte</button>
        <button style="background:#555;" onclick="goScreen('screen-home')">Inicio</button>
    </div>
</div>

<script>
    function login() {
        if(document.getElementById('pass').value === 'jhon2024') {
            goScreen('screen-home');
        } else { alert('Contraseña incorrecta'); }
    }

    function goScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function guardar() {
        if(!document.getElementById('acepto').checked) { 
            alert('Debes marcar: Acepto responsabilidad'); 
            return; 
        }
        document.getElementById('btn-save').style.display = 'none';
        document.getElementById('btns-finales').style.display = 'block';
        alert('Datos registrados exitosamente en el servidor.');
    }
</script>
</body>
</html>
