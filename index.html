<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Llama a Jhon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
/* MANTENGO TUS ESTILOS ORIGINALES */
body{font-family:sans-serif;background:#f5f5f5;max-width:430px;margin:0 auto;padding:1rem;}
.screen{display:none;}
.screen.active{display:block;}
.client-card{background:#fff;padding:15px;margin-bottom:10px;border-radius:10px;border:1px solid #ddd;cursor:pointer;}
#login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;display:flex;justify-content:center;align-items:center;z-index:999;}
.login-box{background:#fff;padding:20px;border-radius:10px;width:90%;}
.user-btn{padding:10px;margin:5px;cursor:pointer;}
.user-btn.selected{background:#1a1a1a;color:#fff;}
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h3>Selecciona tu empresa</h3>
    <button class="user-btn" id="btn-jhon" onclick="selectUser('jhon')">🔧 Jhon</button>
    <button class="user-btn" id="btn-thermo" onclick="selectUser('thermo')">❄️ Thermo</button>
    <input type="password" id="login-pass" placeholder="Contraseña" style="width:100%;padding:10px;margin-bottom:10px;">
    <button onclick="checkLogin()" style="width:100%;padding:10px;background:#000;color:#fff;">Ingresar</button>
  </div>
</div>

<div id="screen-home" class="screen">
  <h1 id="home-title">Cargando...</h1>
  <div id="client-list"></div>
</div>

<script>
const USERS = {
  jhon: { pass:'jhon2024', label:'Llama a Jhon', sheetUrl:'https://script.google.com/macros/s/AKfycbzP4714lVYGCS3N992eIonN2o2spXKGvIl4i2tHo---PuGhBhjcHWWDqt7c5_czatf6/exec' },
  thermo: { pass:'thermo2024', label:'Thermoelectric', sheetUrl:'https://script.google.com/macros/s/AKfycbzePKw2vbFId4-wePXANI6soNGNtGXyMAsje5lIUP3ju3iAke37o6C6PSr4h2x9GI-8/exec' }
};

let currentUser = null, selectedKey = null, db = {clients:[], visits:[]};

function selectUser(k){ 
  selectedKey = k; 
  document.getElementById('btn-jhon').className = (k==='jhon' ? 'user-btn selected' : 'user-btn');
  document.getElementById('btn-thermo').className = (k==='thermo' ? 'user-btn selected' : 'user-btn');
}

function checkLogin(){
  if(!selectedKey || document.getElementById('login-pass').value !== USERS[selectedKey].pass){ alert('Error de acceso'); return; }
  currentUser = USERS[selectedKey];
  document.getElementById('login-screen').style.display='none';
  document.getElementById('home-title').textContent = currentUser.label;
  
  // 1. Cargar local primero para que no se vea vacío
  const local = localStorage.getItem('db_' + selectedKey);
  if(local) { db = JSON.parse(local); renderClients(); }
  
  // 2. Sincronizar con el Excel correcto
  fetch(currentUser.sheetUrl + '?action=readAll')
    .then(r => r.json())
    .then(data => {
      db = data;
      localStorage.setItem('db_' + selectedKey, JSON.stringify(db));
      renderClients();
    })
    .catch(e => console.error("Error cargando Excel:", e));
}

function renderClients(){
  const list = document.getElementById('client-list');
  if(!db.clients || db.clients.length === 0) { list.innerHTML = "No hay clientes."; }
  else {
    list.innerHTML = db.clients.map(c => `
      <div class="client-card">
        <h3>${c.nombre || 'Sin nombre'}</h3>
        <p>${c.telefono || 'Sin teléfono'}</p>
      </div>
    `).join('');
  }
  document.getElementById('screen-home').classList.add('active');
}
</script>
</body>
</html>
