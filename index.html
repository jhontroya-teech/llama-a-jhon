<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Gestión Jhon</title>
    <style>
        body { font-family: sans-serif; max-width: 430px; margin: auto; padding: 20px; background: #f4f4f9; }
        .screen { display: none; }
        .active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 10px; }
        button { width: 100%; padding: 15px; background: #000; color: #fff; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="screen-login" class="screen active card">
    <h2>Login</h2>
    <input type="password" id="pass" placeholder="Clave">
    <button onclick="login()">Ingresar</button>
</div>

<div id="screen-home" class="screen card">
    <h1>Clientes</h1>
    <div id="lista-clientes">Cargando lista...</div>
    <button onclick="goScreen('screen-visit')">+ Nueva Visita</button>
</div>

<div id="screen-visit" class="screen card">
    <h1>Nueva Visita</h1>
    <input type="date" id="fecha">
    <label><input type="checkbox" id="acepto"> Acepto responsabilidad</label>
    <button id="btn-save" onclick="guardar()">Guardar</button>
</div>

<script>
    const URL = 'https://script.google.com/macros/s/AKfycbyC5V4bP6ss4iZdugupMJDU2GKzVK4DaJrynmpp4J3sA0ImcopK96s1TARxsz8DKzIG-w/exec';

    function login() {
        if(document.getElementById('pass').value === 'jhon2024') {
            goScreen('screen-home');
            cargarClientes();
        } else alert('Clave incorrecta');
    }

    async function cargarClientes() {
        const res = await fetch(URL + '?action=readAll');
        const data = await res.json();
        const lista = document.getElementById('lista-clientes');
        lista.innerHTML = data.map(c => `<p>• ${c.nombre} - ${c.servicio}</p>`).join('');
    }

    function goScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function guardar() {
        if(!document.getElementById('acepto').checked) { alert('Acepta la responsabilidad'); return; }
        alert('Guardado exitoso');
    }
</script>
</body>
</html>
