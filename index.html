<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Llama a Jhon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;max-width:430px;margin:0 auto;min-height:100vh;}
.screen{display:none;padding:1rem;padding-bottom:5rem;}
.screen.active{display:block;}
.header{display:flex;align-items:center;gap:10px;background:#fff;margin:-1rem -1rem 1.5rem;padding:1rem;position:sticky;top:0;z-index:10;border-bottom:1px solid #e5e5e5;}
.header h1{font-size:18px;font-weight:600;color:#1a1a1a;flex:1;}
.back-btn{background:none;border:none;cursor:pointer;color:#666;font-size:22px;padding:0;display:flex;align-items:center;}
.section-title{font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;margin-top:1.25rem;}
input,textarea,select{width:100%;padding:11px 14px;border:1px solid #ddd;border-radius:10px;font-size:15px;color:#1a1a1a;background:#fff;font-family:inherit;margin-bottom:10px;outline:none;}
.btn-primary{width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-secondary{width:100%;padding:13px;background:#fff;color:#1a1a1a;border:1px solid #ddd;border-radius:10px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;}
.btn-share{width:100%;padding:13px;background:#25D366;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px;}
.client-card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;}
.client-name{font-size:16px;font-weight:600;color:#1a1a1a;}
.client-meta{font-size:13px;color:#888;margin-top:3px;display:flex;align-items:center;gap:4px;}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:#f0f0f0;color:#555;margin-top:6px;margin-right:4px;}
.fab{position:fixed;bottom:1.5rem;right:1.5rem;width:56px;height:56px;border-radius:50%;background:#1a1a1a;color:#fff;border:none;font-size:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.25);z-index:20;}
.canvas-wrap{border:1px solid #ddd;border-radius:10px;margin-bottom:8px;background:#fff;overflow:hidden;}
canvas#sigCanvas{display:block;touch-action:none;width:100%;height:160px;}
.clear-sig{background:none;border:none;color:#888;font-size:13px;cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:4px;}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.photo-thumb{width:100%;height:100px;object-fit:cover;border-radius:10px;border:1px solid #eee;}
.photo-add{width:100%;height:100px;border:1.5px dashed #ccc;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#aaa;font-size:32px;background:#fafafa;}
.sig-preview{max-width:100%;border-radius:10px;border:1px solid #eee;margin-top:8px;}
.search-wrap{position:relative;margin-bottom:1rem;}
.search-wrap input{padding-left:38px;margin-bottom:0;}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#aaa;font-size:18px;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.stat-card{background:#fff;border-radius:14px;padding:14px;text-align:center;border:1px solid #e5e5e5;}
.stat-num{font-size:28px;font-weight:700;color:#1a1a1a;}
.stat-label{font-size:12px;color:#888;}
.visit-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;}
.visit-tipo{font-size:15px;font-weight:600;color:#1a1a1a;}
.visit-fecha{font-size:13px;color:#888;}
.toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;opacity:0;transition:opacity 0.3s;z-index:100;white-space:nowrap;}
.toast.show{opacity:1;}
.app-logo{width:36px;height:36px;background:#1a1a1a;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;}
.info-card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:14px 16px;margin-bottom:1rem;}
.detail-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px;border-bottom:1px dashed #eee;padding-bottom:6px;}
.detail-label{color:#888;font-weight:500;}
.detail-value{color:#1a1a1a;font-weight:600;text-align:right;}
.sync-indicator { font-size: 11px; color: #888; display: flex; align-items: center; gap: 4px; justify-content: center; margin-bottom: 10px; }
.sync-spin { animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="login-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column;">
    <div style="background: #ffffff; padding: 30px; border-radius: 14px; text-align: center; width: 85%; max-width: 350px;">
        <h2 style="margin-bottom: 5px; color: #1a1a1a; font-weight: 700;">Llama a Jhon</h2>
        <p style="font-size: 13px; color: #888; margin-bottom: 25px;">Control de Clientes</p>
        <button id="btn-entrar" style="width:100%; padding:13px; background:#1a1a1a; color:#fff; border:none; border-radius:10px; font-weight:600; font-size:15px; cursor:pointer;">Ingresar a la App</button>
    </div>
</div>

<!-- INICIO -->
<div id="screen-home" class="screen active">
  <div class="header">
    <div class="app-logo"><i class="ti ti-tool"></i></div>
    <h1>Llama a Jhon</h1>
    <i class="ti ti-refresh" style="font-size:20px;color:#1a4a9a;cursor:pointer;" onclick="fetchDataFromSheets()"></i>
  </div>
  
  <div id="sync-status" class="sync-indicator">Conectando...</div>

  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="total-clients">0</div><div class="stat-label">Clientes</div></div>
    <div class="stat-card"><div class="stat-num" id="total-visits">0</div><div class="stat-label">Servicios</div></div>
  </div>
  <div class="search-wrap">
    <i class="ti ti-search"></i>
    <input type="text" id="search-input" placeholder="Buscar cliente..." oninput="renderClients()">
  </div>
  <div id="client-list"></div>
  <button class="fab" onclick="goNewClient()"><i class="ti ti-plus"></i></button>
</div>

<!-- NUEVO CLIENTE -->
<div id="screen-new-client" class="screen">
  <div class="header">
    <button class="back-btn" onclick="goScreen('screen-home')"><i class="ti ti-arrow-left"></i></button>
    <h1>Nuevo Cliente</h1>
  </div>
  <input type="text" id="c-nombre" placeholder="Nombre completo">
  <input type="tel" id="c-telefono" placeholder="Teléfono">
  <input type="text" id="c-direccion" placeholder="Dirección">
  <select id="c-tipo">
    <option value="">Tipo de aire acondicionado</option>
    <option>Split</option><option>Central</option><option>Ventana</option><option>Otro</option>
  </select>
  <input type="text" id="c-marca" placeholder="Marca (ej. LG, TCL)">
  <input type="text" id="c-btu" placeholder="Capacidad/BTU (ej. 12000)">
  <button class="btn-primary" onclick="saveClient()">Guardar Cliente</button>
  <button class="btn-secondary" onclick="goScreen('screen-home')"><i class="ti ti-home"></i> Cancelar</button>
</div>

<!-- DETALLE CLIENTE -->
<div id="screen-client-detail" class="screen">
  <div class="header">
    <button class="back-btn" onclick="goScreen('screen-home')"><i class="ti ti-arrow-left"></i></button>
    <h1 id="client-detail-name">Cliente</h1>
  </div>
  <div class="info-card" id="client-detail-info"></div>
  <button class="btn-primary" onclick="goNewVisit()"><i class="ti ti-plus"></i> Registrar Nuevo Trabajo</button>
  <div class="section-title" style="margin-top:1.5rem">Historial de Reportes</div>
  <div id="visit-list"></div>
</div>

<!-- NUEVA VISITA -->
<div id="screen-new-visit" class="screen">
  <div class="header">
    <button class="back-btn" onclick="goScreen('screen-client-detail')"><i class="ti ti-arrow-left"></i></button>
    <h1>Registrar Trabajo</h1>
  </div>
  <input type="date" id="v-fecha">
  <select id="v-tipo">
    <option value="">Tipo de servicio</option>
    <option>Limpieza</option><option>Revisión técnica</option><option>Instalación</option><option>Fuga de gas</option>
  </select>
  <textarea id="v-detalle" placeholder="Detalle (ej: esta sucio y gotea)"></textarea>
  <textarea id="v-observacion" placeholder="Observación (ej: se hizo limpieza profunda)"></textarea>
  
  <div class="section-title">Evidencias Fotográficas</div>
  <div class="photo-grid" id="photo-grid"></div>
  <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="addPhotos(this)">
  
  <div class="section-title">Firma del cliente</div>
  <div class="canvas-wrap"><canvas id="sigCanvas"></canvas></div>
  <button class="clear-sig" onclick="clearSig()"><i class="ti ti-trash"></i> Borrar Firma</button>
  
  <button class="btn-primary" onclick="saveVisit()" style="margin-top:1rem">Guardar Reporte</button>
</div>

<!-- VER VISITA -->
<div id="screen-visit-detail" class="screen">
  <div class="header" id="visit-detail-header">
    <button class="back-btn" onclick="goScreen('screen-client-detail')"><i class="ti ti-arrow-left"></i></button>
    <h1>Detalle de visita</h1>
  </div>
  <div id="visit-detail-content"></div>
  <button id="btn-whatsapp-share" class="btn-share" onclick="shareCurrentVisitReport()"><i class="ti ti-brand-whatsapp"></i> Compartir por WhatsApp</button>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbz93xEp7ZF-gKOD_NaRHEpq7b0R8uOpbViE-3TQLkkIwSmanuhYCetpjePVFXQGCMRs/exec';

let db = JSON.parse(localStorage.getItem('lj_db') || '{"clients":[],"visits":[]}');
let currentClientId=null, currentVisitId=null, visitPhotos=[], sigCtx, sigDrawing=false, sigHasContent=false;

// Buscador directo y sólido que respeta las mayúsculas reales de tu Excel
function getVal(obj, keys) {
  if (!obj) return '';
  for (let k of keys) {
    if (obj[k] !== undefined && obj[k] !== null) return obj[k];
  }
  return '';
}

function saveDb(){
  localStorage.setItem('lj_db', JSON.stringify(db));
  document.getElementById('total-clients').textContent = db.clients.length;
  document.getElementById('total-visits').textContent = db.visits.length;
}

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function fetchDataFromSheets(callback) {
  const ind = document.getElementById('sync-status');
  if(ind) ind.innerHTML = `<i class="ti ti-refresh sync-spin"></i> Sincronizando con Excel...`;
  
  fetch(`${SHEET_URL}?action=readAll`)
    .then(res => res.json())
    .then(data => {
      if (data && data.clients) {
        db = data; saveDb(); renderClients();
        if(ind) ind.innerHTML = `<i class="ti ti-cloud-check" style="color:#1a7a4a"></i> Base de datos al día`;
        if(callback) callback();
      }
    })
    .catch(() => {
      if(ind) ind.innerHTML = `<i class="ti ti-cloud-off" style="color:#e53e3e"></i> Modo local (Sin internet)`;
      if(callback) callback();
    });
}

function syncToSheets(data){
  const params = new URLSearchParams();
  Object.keys(data).forEach(k => { if(k!=='fotos' && k!=='firma') params.append(k, data[k] || ''); });
  fetch(`${SHEET_URL}?${params.toString()}`, { mode: 'no-cors' });
}

function uploadMediaToDrive(clientId, visitId, base64Photos, base64Firma) {
  fetch(SHEET_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({ type: 'visit_media', clientId, visitId, fotos: base64Photos, firma: base64Firma })
  }).then(() => setTimeout(() => fetchDataFromSheets(), 2000));
}

document.addEventListener("DOMContentLoaded", function() {
  const urlParams = new URLSearchParams(window.location.search);
  const publicVisitId = urlParams.get('reporte');
  
  if (publicVisitId) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("visit-detail-header").style.display = "none";
    document.getElementById("btn-whatsapp-share").style.display = "none";
    showPublicReportDirect(publicVisitId); 
    return;
  }
  
  if (sessionStorage.getItem("lj_logged") === "true") {
    document.getElementById("login-screen").style.display = "none"; fetchDataFromSheets();
  }
  document.getElementById("btn-entrar").onclick = function() {
    sessionStorage.setItem("lj_logged", "true");
    document.getElementById("login-screen").style.display = "none"; fetchDataFromSheets();
  };
});

function renderClients(){
  const q = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('client-list');
  
  if (!db.clients) return;
  
  const filtered = db.clients.filter(c => {
    let n = getVal(c, ['Nombre', 'id', 'ID']).toString().toLowerCase();
    return n.includes(q);
  });
  
  list.innerHTML = filtered.map(c => {
    let id = getVal(c, ['ID', 'id']);
    let name = getVal(c, ['Nombre', 'nombre']) || 'Sin Nombre';
    let tel = getVal(c, ['Teléfono', 'telefono']) || '—';
    let dir = getVal(c, ['Dirección', 'direccion']) || '—';
    let tipo = getVal(c, ['Tipo', 'tipo']) || 'Split';
    
    const vCount = (db.visits || []).filter(v => {
      let vClientId = getVal(v, ['Cliente ID', 'clientId']);
      return String(vClientId) === String(id);
    }).length;
    
    return `<div class="client-card" onclick="openClient('${id}')">
      <div class="client-name">${name}</div>
      <div class="client-meta"><i class="ti ti-phone"></i> ${tel}</div>
      <div class="client-meta"><i class="ti ti-map-pin"></i> ${dir}</div>
      <span class="badge" style="background:#e6f0ff;color:#1a4a9a;">${tipo}</span>
      <span class="badge" style="background:#f0f0f0;color:#555;">${vCount} servicios</span>
    </div>`;
  }).join('');
}

function openClient(id){ currentClientId = id; goScreen('screen-client-detail'); }

function renderClientDetail(){
  const c = db.clients.find(x => String(getVal(x, ['ID', 'id'])) === String(currentClientId)); if(!c) return;
  
  document.getElementById('client-detail-name').textContent = getVal(c, ['Nombre', 'nombre']);
  document.getElementById('client-detail-info').innerHTML = `
    <div class="detail-row"><span class="detail-label">Celular:</span><span class="detail-value">${getVal(c, ['Teléfono', 'telefono']) || '—'}</span></div>
    <div class="detail-row"><span class="detail-label">Dirección:</span><span class="detail-value">${getVal(c, ['Dirección', 'direccion']) || '—'}</span></div>
    <div class="detail-row"><span class="detail-label">Marca:</span><span class="detail-value">${getVal(c, ['Marca', 'marca']) || '—'}</span></div>
    <div class="detail-row"><span class="detail-label">Capacidad:</span><span class="detail-value">${getVal(c, ['BTU', 'btu']) || '—'}</span></div>
  `;
  
  const vts = (db.visits || []).filter(v => String(getVal(v, ['Cliente ID', 'clientId'])) === String(currentClientId));
  
  if(vts.length === 0) {
    document.getElementById('visit-list').innerHTML = `<p style="font-size:14px;color:#888;text-align:center;padding:15px;">No hay reportes registrados aún.</p>`;
  } else {
    document.getElementById('visit-list').innerHTML = vts.map(v => {
      let vId = getVal(v, ['ID', 'id']);
      let vTipo = getVal(v, ['Tipo', 'tipo']) || 'Servicio';
      let vFecha = (getVal(v, ['Fecha', 'fecha']) || '').split('T')[0];
      return `<div class="visit-card" onclick="openVisit('${vId}')">
        <div class="visit-tipo">${vTipo}</div>
        <div class="visit-fecha">${vFecha}</div>
      </div>`;
    }).join('');
  }
}

function goScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='screen-home') renderClients();
  if(id==='screen-client-detail') renderClientDetail();
  if(id==='screen-new-visit') initSig();
}

function goNewClient(){ goScreen('screen-new-client'); }

function saveClient(){
  const nom = document.getElementById('c-nombre').value.trim(); if(!nom) return;
  const id = 'c_' + Date.now();
  const d = {
    type: 'client', id: id, ID: id,
    nombre: nom, Nombre: nom,
    telefono: document.getElementById('c-telefono').value.trim(), Teléfono: document.getElementById('c-telefono').value.trim(),
    direccion: document.getElementById('c-direccion').value.trim(), Dirección: document.getElementById('c-direccion').value.trim(),
    tipo: document.getElementById('c-tipo').value, Tipo: document.getElementById('c-tipo').value,
    marca: document.getElementById('c-marca').value.trim(), Marca: document.getElementById('c-marca').value.trim(),
    btu: document.getElementById('c-btu').value.trim(), BTU: document.getElementById('c-btu').value.trim()
  };
  db.clients.push(d); saveDb(); syncToSheets(d); goScreen('screen-home');
}

function goNewVisit(){
  visitPhotos = []; document.getElementById('v-fecha').value = new Date().toISOString().split('T')[0];
  renderPhotoGrid(); goScreen('screen-new-visit');
}

function initSig(){
  const canvas = document.getElementById('sigCanvas'); canvas.width = canvas.parentElement.clientWidth; canvas.height = 160;
  sigCtx = canvas.getContext('2d'); sigCtx.strokeStyle = '#1a1a1a'; sigCtx.lineWidth = 2.5; sigHasContent = false;
  canvas.ontouchstart = canvas.onmousedown = () => { sigDrawing = true; sigCtx.beginPath(); sigHasContent = true; };
  canvas.ontouchmove = canvas.onmousemove = e => {
    if(!sigDrawing) return; const r = canvas.getBoundingClientRect();
    const clX = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
    const clY = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
    sigCtx.lineTo(clX, clY); sigCtx.stroke();
  };
  canvas.ontouchend = canvas.onmouseup = () => sigDrawing = false;
}

function clearSig(){ if(sigCtx){ sigCtx.clearRect(0,0,500,200); sigHasContent = false; } }

function addPhotos(input){
  Array.from(input.files).forEach(f => {
    const r = new FileReader();
    r.onload = e => {
      const img = new Image(); img.src = e.target.result;
      img.onload = () => {
        const canvas = document.createElement('canvas'); const max = 600; let w = img.width, h = img.height;
        if(w > h) { if(w > max){ h *= max/w; w = max; } } else { if(h > max){ w *= max/h; h = max; } }
        canvas.width = w; canvas.height = h; canvas.getContext('2d').drawImage(img, 0,0, w, h);
        visitPhotos.push(canvas.toDataURL('image/jpeg', 0.6)); renderPhotoGrid();
      };
    };
    r.readAsDataURL(f);
  });
}

function renderPhotoGrid(){ document.getElementById('photo-grid').innerHTML = visitPhotos.map(p => `<img src="${p}" class="photo-thumb">`).join('') + `<div class="photo-add" onclick="document.getElementById('photo-input').click()">+</div>`; }

function saveVisit(){
  const id = 'v_' + Date.now();
  const d = {
    type: 'visit', id: id, ID: id, clientId: currentClientId, 'Cliente ID': currentClientId,
    fecha: document.getElementById('v-fecha').value, Fecha: document.getElementById('v-fecha').value,
    tipo: document.getElementById('v-tipo').value, Tipo: document.getElementById('v-tipo').value,
    detalle: document.getElementById('v-detalle').value, Detalle: document.getElementById('v-detalle').value,
    observacion: document.getElementById('v-observacion').value, Observación: document.getElementById('v-observacion').value,
    fotos: [...visitPhotos], firma: sigHasContent ? document.getElementById('sigCanvas').toDataURL() : null
  };
  db.visits.push(d); saveDb(); syncToSheets(d);
  uploadMediaToDrive(currentClientId, id, d.fotos, d.firma);
  goScreen('screen-client-detail');
}

function openVisit(id){
  currentVisitId = id; const v = db.visits.find(x => String(getVal(x, ['ID', 'id'])) === String(id)); if(!v) return;
  let fHtml = (v.fotos || []).map(p => `<img src="${p}" style="width:100%;border-radius:10px;margin-bottom:8px;">`).join('');
  document.getElementById('visit-detail-content').innerHTML = `
    <div class="info-card">
      <div class="detail-row"><span class="detail-label">Servicio:</span><span class="detail-value">${getVal(v, ['Tipo', 'tipo'])}</span></div>
      <div class="detail-row"><span class="detail-label">Fecha:</span><span class="detail-value">${(getVal(v, ['Fecha', 'fecha'])||'').split('T')[0]}</span></div>
      <div class="section-title">Diagnóstico</div><p style="font-size:14px;background:#f9f9f9;padding:8px;border-radius:6px;margin-bottom:10px;">${getVal(v, ['Detalle', 'detalle'])||'—'}</p>
      <div class="section-title">Trabajo Realizado</div><p style="font-size:14px;background:#f9f9f9;padding:8px;border-radius:6px;margin-bottom:10px;">${getVal(v, ['Observación', 'observacion'])||'—'}</p>
      ${fHtml ? '<div class="section-title">Evidencias Guardadas</div>' + fHtml : ''}
      ${v.firma ? '<div class="section-title">Firma de Conformidad</div><img src="'+v.firma+'" class="sig-preview">' : ''}
    </div>`;
  goScreen('screen-visit-detail');
}

function showPublicReportDirect(visitId) {
  goScreen('screen-visit-detail');
  const contentDiv = document.getElementById('visit-detail-content');
  contentDiv.innerHTML = `<p style="text-align:center;color:#666;padding:20px;"><i class="ti ti-refresh sync-spin"></i> Descargando reporte digital desde la nube...</p>`;
  
  fetchDataFromSheets(() => {
    const v = db.visits.find(x => String(getVal(x, ['ID', 'id'])) === String(visitId));
    if (!v) {
      contentDiv.innerHTML = `<p style="text-align:center;color:#e53e3e;padding:20px;">El reporte se está procesando en la base de datos de Google Sheets. Por favor, recarga en unos segundos.</p>`;
      return;
    }
    let fHtml = (v.fotos || []).map(p => `<img src="${p}" style="width:100%;border-radius:10px;margin-bottom:8px;">`).join('');
    
    contentDiv.innerHTML = `
      <div class="info-card">
        <h2 style="text-align:center; font-size:18px; margin-bottom:4px;">Llama a Jhon</h2>
        <p style="text-align:center; font-size:12px; color:#666; margin-bottom:15px; border-bottom:1px dashed #ddd; padding-bottom:10px;">Reporte Técnico Digital</p>
        
        <div class="detail-row"><span class="detail-label">Servicio:</span><span class="detail-value">${getVal(v, ['Tipo', 'tipo'])}</span></div>
        <div class="detail-row"><span class="detail-label">Fecha:</span><span class="detail-value">${(getVal(v, ['Fecha', 'fecha'])||'').split('T')[0]}</span></div>
        
        <div class="section-title">Diagnóstico</div>
        <p style="font-size:14px;background:#f9f9f9;padding:8px;border-radius:6px;margin-bottom:10px;">${getVal(v, ['Detalle', 'detalle'])||'—'}</p>
        
        <div class="section-title">Trabajo Realizado</div>
        <p style="font-size:14px;background:#f9f9f9;padding:8px;border-radius:6px;margin-bottom:10px;">${getVal(v, ['Observación', 'observacion'])||'—'}</p>
        
        ${fHtml ? '<div class="section-title">Evidencias Guardadas</div>' + fHtml : ''}
        ${v.firma ? '<div class="section-title">Firma de Conformidad</div><img src="'+v.firma+'" class="sig-preview">' : ''}
      </div>`;
  });
}

function shareCurrentVisitReport() {
  if (!currentVisitId) return;
  const baseUrl = window.location.href.split('?')[0];
  const shareUrl = `${baseUrl}?reporte=${currentVisitId}`;
  if (navigator.share) {
    navigator.share({ title: 'Reporte Técnico Llama a Jhon', text: 'Hola, le comparto el reporte técnico digital de su equipo de aire acondicionado:', url: shareUrl }).catch(()=>{});
  } else {
    navigator.clipboard.writeText(shareUrl); showToast("📋 ¡Enlace copiado para enviarlo por WhatsApp!");
  }
}
</script>
