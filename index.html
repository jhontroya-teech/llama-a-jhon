<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Llama a Jhon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
body{font-family:sans-serif;background:#f5f5f5;max-width:430px;margin:0 auto;padding:1rem;}
.header{background:#fff;padding:1rem;border-radius:12px;margin-bottom:1rem;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.stats{display:flex;justify-content:space-around;margin-bottom:1rem;font-weight:bold;color:#333;}
.client-card{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 5px rgba(0,0,0,0.1);cursor:pointer;}
.fab{position:fixed;bottom:2rem;right:2rem;background:#1a1a1a;color:#fff;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 4px 10px rgba(0,0,0,0.3);}
</style>
</head>
<body>

<div class="header">
  <div style="display:flex; justify-content:space-between; align-items:center;">
    <h1>Clientes</h1>
    <i class="ti ti-refresh" onclick="fetchDataFromSheets()"></i>
  </div>
  <div id="stats" class="stats" style="margin-top:10px;">Cargando...</div>
</div>

<div id="client-list"></div>
<div class="fab" onclick="addClientPrompt()">+</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwDOF7kyHlPUVB0VVKqOsZRJ9duEbEnd8bfDeRZ9A_dauG8b4BOvjtxHIc-F0m0mOer8A/exec';
let db = {clients:[], visits:[]};

function fetchDataFromSheets() {
  fetch(SHEET_URL).then(res => res.json()).then(data => {
    db = data;
    render();
  });
}

function render() {
  // Actualizar contadores
  document.getElementById('stats').innerHTML = `<span>${db.clients.length} Clientes</span> <span>${db.visits.length} Servicios</span>`;
  
  // Renderizar lista
  const list = document.getElementById('client-list');
  list.innerHTML = db.clients.map(c => `
    <div class="client-card" onclick="viewClientReports('${c.ID}')">
      <div style="font-weight:700;">${c.Nombre}</div>
      <div style="font-size:13px; color:#666;">${c.Tipo} - ${c.Marca}</div>
    </div>`).join('');
}

function viewClientReports(clientId) {
  const reports = db.visits.filter(v => v.ClienteID == clientId);
  if(reports.length === 0) { alert("Este cliente no tiene trabajos previos."); return; }
  let msg = "HISTORIAL DE TRABAJOS:\n\n" + reports.map(r => `📅 ${r.Fecha}: ${r.Tipo}\n📝 ${r.Observación}`).join('\n\n---\n\n');
  alert(msg);
}

function addClientPrompt() {
  const nombre = prompt("Nombre del nuevo cliente:");
  if(nombre) {
    const nuevo = {type:'client', ID: 'c_' + Date.now(), Nombre: nombre, Teléfono: '', Dirección: '', Tipo: 'Split', Marca: 'N/A', BTU: '0'};
    fetch(SHEET_URL, {method: 'POST', body: JSON.stringify(nuevo)}).then(() => alert("Agregado. Refresca la app."));
  }
}

fetchDataFromSheets();
</script>
</body>
</html>
