<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Llama a Jhon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;max-width:430px;margin:0 auto;min-height:100vh;}
.screen{display:none;padding:1rem;padding-bottom:5rem;}
.screen.active{display:block;}
.header{display:flex;align-items:center;gap:10px;background:#fff;margin:-1rem -1rem 1.5rem;padding:1rem;position:sticky;top:0;z-index:10;border-bottom:1px solid #e5e5e5;}
.header h1{font-size:18px;font-weight:600;color:#1a1a1a;flex:1;}
.back-btn{background:none;border:none;cursor:pointer;color:#666;font-size:22px;padding:0;display:flex;align-items:center;}
.section-title{font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;margin-top:1.25rem;}
.section-title:first-child{margin-top:0;}
input,textarea,select{width:100%;padding:11px 14px;border:1px solid #ddd;border-radius:10px;font-size:15px;color:#1a1a1a;background:#fff;font-family:inherit;margin-bottom:10px;outline:none;-webkit-appearance:none;appearance:none;}
input:focus,textarea:focus,select:focus{border-color:#1a1a1a;}
textarea{min-height:85px;resize:vertical;}
.btn-primary{width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;}
.btn-primary:disabled{background:#999;cursor:not-allowed;}
.btn-secondary{width:100%;padding:13px;background:#fff;color:#1a1a1a;border:1px solid #ddd;border-radius:10px;font-size:15px;cursor:pointer;margin-top:8px;font-family:inherit;}
.btn-danger{width:100%;padding:13px;background:#fff;color:#e53e3e;border:1px solid #e53e3e;border-radius:10px;font-size:15px;cursor:pointer;margin-top:8px;font-family:inherit;}
.btn-share{width:100%;padding:13px;background:#1a4a9a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
.client-card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;}
.client-name{font-size:16px;font-weight:600;color:#1a1a1a;}
.client-meta{font-size:13px;color:#888;margin-top:3px;}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:#f0f0f0;color:#555;margin-top:6px;margin-right:4px;}
.fab{position:fixed;bottom:1.5rem;right:1.5rem;width:56px;height:56px;border-radius:50%;background:#1a1a1a;color:#fff;border:none;font-size:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.25);z-index:20;}
.canvas-wrap{border:1px solid #ddd;border-radius:10px;margin-bottom:8px;background:#fff;overflow:hidden;}
canvas#sigCanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:160px;}
.clear-sig{background:none;border:none;color:#888;font-size:13px;cursor:pointer;padding:4px 0;font-family:inherit;display:flex;align-items:center;gap:4px;}
.empty-state{text-align:center;padding:3rem 1rem;color:#aaa;}
.empty-state i{font-size:52px;display:block;margin-bottom:1rem;}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px;}
.detail-row:last-child{border-bottom:none;}
.detail-label{color:#888;flex-shrink:0;margin-right:12px;}
.detail-value{color:#1a1a1a;font-weight:500;text-align:right;word-break:break-word;}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.photo-thumb{width:100%;height:100px;object-fit:cover;border-radius:10px;border:1px solid #eee;}
.photo-add{width:100%;height:100px;border:1.5px dashed #ccc;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#aaa;font-size:32px;background:#fafafa;}
.search-wrap{position:relative;margin-bottom:1rem;}
.search-wrap input{padding-left:38px;margin-bottom:0;}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#aaa;font-size:18px;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.stat-card{background:#fff;border-radius:14px;padding:14px;text-align:center;border:1px solid #e5e5e5;}
.stat-num{font-size:28px;font-weight:700;color:#1a1a1a;}
.stat-label{font-size:12px;color:#888;margin-top:2px;}
.visit-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;}
.visit-tipo{font-size:15px;font-weight:600;color:#1a1a1a;margin-top:2px;}
.visit-fecha{font-size:13px;color:#888;}
.toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100;white-space:nowrap;}
.toast.show{opacity:1;}
.app-logo{width:36px;height:36px;background:#1a1a1a;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;flex-shrink:0;}
.info-card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:14px 16px;margin-bottom:1rem;}
.sync-indicator{font-size:11px;color:#888;display:flex;align-items:center;gap:4px;font-weight:500;justify-content:center;margin-bottom:10px;}
.sync-spin{animation:spin 1s linear infinite;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.checkbox-resp{display:flex;align-items:flex-start;gap:10px;background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px 14px;margin-bottom:12px;}
.loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:#f5f5f5;z-index:9998;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;}
.loading-spinner{width:36px;height:36px;border:3px solid #ddd;border-top-color:#1a1a1a;border-radius:50%;animation:spin 0.8s linear infinite;}
</style>

<!-- SCRIPT DE DESBLOQUEO INMEDIATO -->
<script>
  document.addEventListener("DOMContentLoaded", function() {
    var overlay = document.getElementById('loading-overlay');
    if(overlay) { overlay.style.display = 'none'; }
  });
</script>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- LOADING OVERLAY -->
<div id="loading-overlay" class="loading-overlay">
  <div class="loading-spinner"></div>
  <p style="font-size:14px;color:#888;">Cargando...</p>
</div>

<!-- LOGIN -->
<div id="login-screen" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;z-index:9999;display:none;justify-content:center;align-items:center;flex-direction:column;">
  <div style="background:#fff;padding:30px;border-radius:14px;text-align:center;width:85%;max-width:350px;">
    <h2 style="margin-bottom:5px;color:#1a1a1a;font-weight:700;">Llama a Jhon</h2>
    <p style="font-size:13px;color:#888;margin-bottom:25px;">Control de Clientes</p>
    <input type="text" id="username" placeholder="Usuario (Dejar vacío)" style="width:100%;padding:12px;margin-bottom:15px;border:1px solid #ddd;border-radius:10px;">
    <input type="password" id="password" placeholder="Contraseña (Dejar vacío)" style="width:100%;padding:12px;margin-bottom:20px;border:1px solid #ddd;border-radius:10px;">
    <button id="btn-entrar" style="width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-weight:600;font-size:15px;cursor:pointer;">Ingresar</button>
    <div id="login-alert-box" style="margin-top:15px;padding:10px;border-radius:8px;font-size:14px;font-weight:600;display:none;"></div>
  </div>
</div>

<!-- PANEL DE INICIO -->
<div id="screen-home" class="screen">
  <div class="header">
    <div class="app-logo"><i class="ti ti-tool"></i></div>
    <h1>Llama a Jhon</h1>
    <i class="ti ti-refresh" id="manual-sync-btn" style="font-size:20px;color:#1a4a9a;cursor:pointer;"></i>
  </div>
  <div id="sync-status" class="sync-indicator"><i class="ti ti-cloud-check"></i> Conectando...</div>
  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="total-clients">0</div><div class="stat-label">Clientes</div></div>
    <div class="stat-card"><div class="stat-num" id="total-visits">0</div><div class="stat-label">Visitas</div></div>
  </div>
  <div class="search-wrap">
    <i class="ti ti-search"></i>
    <input type="text" id="search-input" placeholder="Buscar cliente...">
  </div>
  <div id="client-list"></div>
  <button class="fab" id="btn-add-client-fab"><i class="ti ti-plus"></i></button>
</div>

<!-- CREAR / EDITAR CLIENTE -->
<div id="screen-new-client" class="screen">
  <div class="header">
    <button class="back-btn" id="btn-back-to-home"><i class="ti ti-arrow-left"></i></button>
    <h1 id="new-client-title">Nuevo cliente</h1>
  </div>
  <div class="section-title">Datos personales</div>
  <input type="text" id="c-nombre" placeholder="Nombre completo">
  <input type="tel" id="c-telefono" placeholder="Teléfono">
  <input type="text" id="c-direccion" placeholder="Dirección">
  <div class="section-title">Equipo</div>
  <select id="c-tipo">
    <option value="">Tipo de aire acondicionado</option>
    <option>Split</option><option>Central</option><option>Ventana</option>
    <option>Mini split</option><option>Cassette</option><option>Otro</option>
  </select>
  <input type="text" id="c-marca" placeholder="Marca y modelo (opcional)">
  <input type="text" id="c-btu" placeholder="BTU / Capacidad (opcional)">
  <button class="btn-primary" id="btn-save-client">Guardar cliente</button>
  <button class="btn-secondary" id="btn-cancel-client">Cancelar</button>
</div>

<!-- DETALLE DEL CLIENTE -->
<div id="screen-client-detail" class="screen">
  <div class="header">
    <button class="back-btn" id="btn-detail-back"><i class="ti ti-arrow-left"></i></button>
    <h1 id="client-detail-name">Cliente</h1>
  </div>
  <div class="info-card" id="client-detail-info"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
    <button class="btn-secondary" style="margin-top:0" id="btn-edit-client"><i class="ti ti-edit"></i> Editar</button>
    <button class="btn-primary" style="margin-top:0" id="btn-go-new-visit"><i class="ti ti-plus"></i> Visita</button>
  </div>
  <div class="section-title" style="margin-top:1.5rem">Historial de visitas</div>
  <div id="visit-list"></div>
</div>

<!-- FORMULARIO DE NUEVA VISITA -->
<div id="screen-new-visit" class="screen">
  <div class="header">
    <button class="back-btn" id="btn-visit-back"><i class="ti ti-arrow-left"></i></button>
    <h1 id="new-visit-title">Nueva visita</h1>
  </div>
  <div class="section-title">Información</div>
  <input type="date" id="v-fecha">
  <select id="v-tipo">
    <option value="">Tipo de servicio</option>
    <option>Instalación</option><option>Limpieza</option><option>Revisión técnica</option>
    <option>Fuga de gas</option><option>Mantenimiento preventivo</option>
    <option>Reparación</option><option>Otro</option>
  </select>
  <div class="section-title">Detalle del equipo</div>
  <textarea id="v-detalle" placeholder="¿Qué tenía el aire? Estado del equipo..."></textarea>
  <div class="section-title">Observación</div>
  <textarea id="v-observacion" placeholder="¿Qué se resolvió? Trabajo realizado..."></textarea>
  <div class="section-title">Fotos</div>
  <div class="photo-grid" id="photo-grid">
    <div class="photo-add" id="btn-add-photo"><i class="ti ti-camera"></i></div>
  </div>
  <input type="file" id="photo-input" accept="image/*" multiple style="display:none">
  
  <div class="checkbox-resp">
    <input type="checkbox" id="v-responsabilidad" style="-webkit-appearance:checkbox;appearance:checkbox;width:20px;height:20px;flex-shrink:0;margin-top:2px;cursor:pointer;">
    <label for="v-responsabilidad" style="font-size:13px;color:#444;line-height:1.4;cursor:pointer;">He sido informado/a sobre los riesgos técnicos y decido proceder bajo mi propia responsabilidad.</label>
  </div>
  <div class="section-title">Firma del cliente</div>
  <p style="font-size:13px;color:#888;margin-bottom:8px;">El cliente firma con el dedo:</p>
  <div class="canvas-wrap"><canvas id="sigCanvas"></canvas></div>
  <button class="clear-sig" id="btn-clear-sig"><i class="ti ti-trash"></i> Limpiar firma</button>
  <button class="btn-primary" id="btn-guardar-visita">Guardar y Generar PDF</button>
  <button class="btn-secondary" id="btn-cancelar-visita">Cancelar</button>
</div>

<!-- DETALLE ADMINISTRATIVO DE LA VISITA -->
<div id="screen-visit-detail" class="screen">
  <div class="header">
    <button class="back-btn" id="btn-vdetail-back"><i class="ti ti-arrow-left"></i></button>
    <h1>Detalle de visita</h1>
  </div>
  <div id="visit-detail-content"></div>
  <button class="btn-share" id="btn-compartir-visita"><i class="ti ti-file-text"></i> Abrir / Compartir PDF Online</button>
  <button class="btn-danger" id="btn-delete-visit-btn" style="margin-top:15px;"><i class="ti ti-trash"></i> Eliminar visita permanente</button>
</div>

<script type="module">
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyUUziORBw7RLEhWpbLOsFtjWTybII3fs3ZzZ3JEPxoqUEWj3TQIW1-7UzBFiuo-c2NAg/exec';

let db = JSON.parse(localStorage.getItem('lj_db') || '{"clients":[],"visits":[]}');
let currentClientId=null, currentVisitId=null, editingClientId=null;
let visitPhotos=[], sigCtx=null, sigDrawing=false, sigHasContent=false;

window.renderClients = renderClients;
window.goNewClient = goNewClient;
window.openClient = openClient;
window.editClient = editClient;
window.saveClient = saveClient;
window.goNewVisit = goNewVisit;
window.clearSig = clearSig;
window.saveVisit = saveVisit;
window.openVisit = openVisit;
window.deleteVisit = deleteVisit;
window.fetchDataFromSheets = fetchDataFromSheets;
window.goScreen = goScreen;

function saveLocalDb(){ localStorage.setItem('lj_db', JSON.stringify(db)); updateStats(); }

function showToast(msg){
  const t=document.getElementById('toast');
  if(t) { t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }
}

function setSyncStatus(html){ const el=document.getElementById('sync-status'); if(el) el.innerHTML=html; }

document.getElementById('btn-add-photo').onclick = () => document.getElementById('photo-input').click();
document.getElementById('photo-input').onchange = function(e) {
  const files = e.target.files;
  for(let i=0; i<files.length; i++) {
    const reader = new FileReader();
    reader.onload = function(evt) {
      visitPhotos.push(evt.target.result);
      renderPhotosGrid();
    }
    reader.readAsDataURL(files[i]);
  }
};

function renderPhotosGrid() {
  const grid = document.getElementById('photo-grid');
  grid.innerHTML = '<div class="photo-add" id="btn-add-photo"><i class="ti ti-camera"></i></div>';
  document.getElementById('btn-add-photo').onclick = () => document.getElementById('photo-input').click();
  visitPhotos.forEach((src, idx) => {
    const img = document.createElement('img');
    img.src = src;
    img.className = 'photo-thumb';
    img.onclick = () => { if(confirm('¿Quieres quitar esta foto?')) { visitPhotos.splice(idx,1); renderPhotosGrid(); } };
    grid.insertBefore(img, grid.firstChild);
  });
}

function initSig() {
  const canvas = document.getElementById('sigCanvas');
  sigCtx = canvas.getContext('2d');
  canvas.width = canvas.parentElement.offsetWidth;
  canvas.height = 160;
  sigCtx.strokeStyle = "#1a1a1a";
  sigCtx.lineWidth = 2;
  sigHasContent = false;

  const getPos = (e) => {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  };

  const start = (e) => { sigDrawing = true; const p = getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x, p.y); };
  const move = (e) => { if(!sigDrawing) return; e.preventDefault(); const p = getPos(e); sigCtx.lineTo(p.x, p.y); sigCtx.stroke(); sigHasContent = true; };
  const stop = () => { sigDrawing = false; };

  canvas.onmousedown = start; canvas.onmousemove = move; window.onmouseup = stop;
  canvas.ontouchstart = start; canvas.ontouchmove = move; canvas.ontouchend = stop;
}

function clearSig() { if(sigCtx) sigCtx.clearRect(0, 0, sigCanvas.width, sigCanvas.height); sigHasContent = false; }

async function saveClient() {
  const nombre = document.getElementById('c-nombre').value.trim();
  if(!nombre) return showToast('El nombre es obligatorio');
  
  const clientData = {
    type: 'client',
    id: editingClientId || 'c_' + Date.now(),
    nombre: nombre,
    telefono: document.getElementById('c-telefono').value,
    direccion: document.getElementById('c-direccion').value,
    tipo: document.getElementById('c-tipo').value,
    marca: document.getElementById('c-marca').value,
    btu: document.getElementById('c-btu').value
  };

  setSyncStatus(`<i class="ti ti-refresh sync-spin"></i> Guardando cliente...`);
  
  try {
    if(!editingClientId) db.clients.push(clientData);
    else { const idx=db.clients.findIndex(x=>x.id===editingClientId); db.clients[idx] = clientData; }
    saveLocalDb();
    
    await fetch(SHEET_URL, { method: 'POST', body: JSON.stringify(clientData) });
    showToast('Cliente guardado ✓');
    goScreen('screen-home');
    fetchDataFromSheets();
  } catch(e) {
    showToast('Guardado localmente');
    goScreen('screen-home');
  }
}

async function saveVisit() {
  const tipo = document.getElementById('v-tipo').value;
  const fecha = document.getElementById('v-fecha').value;
  if(!tipo || !fecha) return showToast('Fecha y Tipo de servicio obligatorios');

  const visitId = 'v_' + Date.now();
  const firmaBase64 = sigHasContent ? document.getElementById('sigCanvas').toDataURL() : null;

  const visitPayload = {
    type: 'visit',
    visitId: visitId,
    clientId: currentClientId,
    fecha: fecha,
    tipo: tipo,
    detalle: document.getElementById('v-detalle').value,
    observacion: document.getElementById('v-observacion').value,
    responsabilidad: document.getElementById('v-responsabilidad').checked,
    fotos: visitPhotos,
    firma: firmaBase64
  };

  try {
    const res = await fetch(SHEET_URL, { method: 'POST', body: JSON.stringify(visitPayload) });
    const json = await res.json();
    
    if(json.status === 'success') {
      const localVisit = {
        id: visitId,
        clientId: currentClientId,
        fecha: fecha,
        tipo: tipo,
        detalle: visitPayload.detalle,
        observacion: visitPayload.observacion,
        pdfUrl: json.pdfUrl
      };
      db.visits.push(localVisit);
      saveLocalDb();
      
      showToast('¡Reporte generado! ✓');
      openVisit(visitId);
    } else {
      alert('Error: ' + json.message);
    }
  } catch(e) {
    alert('Guardado en el celular de forma offline.');
    db.visits.push({ id: visitId, clientId: currentClientId, fecha: fecha, tipo: tipo, detalle: visitPayload.detalle, observacion: visitPayload.observacion, pdfUrl: '' });
    saveLocalDb();
    goScreen('screen-client-detail');
  }
}

async function deleteVisit() {
  if(!confirm('¿Eliminar permanentemente este reporte?')) return;
  try {
    await fetch(`${SHEET_URL}?action=deleteVisit&visitId=${currentVisitId}`);
    db.visits = db.visits.filter(x => x.id !== currentVisitId);
    saveLocalDb();
    showToast('Visita eliminada ✓');
    goScreen('screen-client-detail');
  } catch(e) {
    db.visits = db.visits.filter(x => x.id !== currentVisitId);
    saveLocalDb();
    goScreen('screen-client-detail');
  }
}

function fetchDataFromSheets(){
  const icon=document.getElementById('manual-sync-btn');
  setSyncStatus(`<i class="ti ti-refresh sync-spin"></i> Sincronizando...`);
  if(icon) icon.classList.add('sync-spin');
  
  fetch(`${SHEET_URL}?action=readAll`)
    .then(r=>r.json())
    .then(data=>{ 
      if(data && data.clients){ 
        db=data; 
        saveLocalDb(); 
        renderClients(); 
        setSyncStatus(`<i class="ti ti-cloud-check" style="color:#1a7a4a"></i> Sincronizado`); 
      } 
    })
    .catch(()=>{
      setSyncStatus(`<i class="ti ti-cloud-off" style="color:#e53e3e"></i> Modo local`);
    })
    .finally(()=>{ 
      if(icon) icon.classList.remove('sync-spin');
    });
}

function goScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  if(id==='screen-home'){updateStats();renderClients();}
  if(id==='screen-client-detail') renderClientDetail();
  if(id==='screen-new-visit') { initSig(); visitPhotos=[]; renderPhotosGrid(); document.getElementById('v-responsabilidad').checked=false; }
}

function updateStats(){
  document.getElementById('total-clients').textContent=db.clients.length;
  document.getElementById('total-visits').textContent=db.visits.length;
}

function renderClients(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const list=document.getElementById('client-list');
  const filtered=db.clients.filter(c=>c.nombre.toLowerCase().includes(q)||(c.direccion||'').toLowerCase().includes(q));
  if(!filtered.length){list.innerHTML=`<div class="empty-state"><i class="ti ti-users"></i><p>Sin resultados</p></div>`;return;}
  list.innerHTML=filtered.map(c=>{
    const visits=db.visits.filter(v=>v.clientId===c.id);
    return `<div class="client-card" onclick="openClient('${c.id}')">
      <div class="client-name">${c.nombre}</div>
      <div class="client-meta"><i class="ti ti-map-pin"></i> ${c.direccion||'Sin dirección'}</div>
      <span class="badge" style="background:#e6f0ff;color:#1a4a9a;">${c.tipo||'Sin tipo'}</span>
      <span class="badge" style="background:#f0f0f0;color:#555;">${visits.length} visitas</span>
    </div>`;
  }).join('');
}

function openClient(id){currentClientId=id;goScreen('screen-client-detail');}

function renderClientDetail(){
  const c=db.clients.find(x=>x.id===currentClientId); if(!c) return;
  document.getElementById('client-detail-name').textContent=c.nombre;
  document.getElementById('client-detail-info').innerHTML=`
    <div class="detail-row"><span class="detail-label">Teléfono</span><span class="detail-value">${c.telefono||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Dirección</span><span class="detail-value">${c.direccion||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Tipo</span><span class="detail-value">${c.tipo||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Marca</span><span class="detail-value">${c.marca||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">BTU</span><span class="detail-value">${c.btu||'—'}</span></div>`;
  
  const visits=db.visits.filter(v=>v.clientId===currentClientId);
  const vlist=document.getElementById('visit-list');
  if(!visits.length){vlist.innerHTML=`<div class="empty-state"><p>Sin visitas registradas</p></div>`;return;}
  vlist.innerHTML=visits.map(v=>`<div class="visit-card" onclick="openVisit('${v.id}')"><div class="visit-tipo">${v.tipo}</div><div class="visit-fecha">${v.fecha}</div></div>`).join('');
}

function openVisit(id) {
  currentVisitId = id;
  const v = db.visits.find(x => x.id === id);
  if(!v) return;
  
  goScreen('screen-visit-detail');
  document.getElementById('visit-detail-content').innerHTML = `
    <div class="info-card">
      <div class="detail-row"><span class="detail-label">Servicio</span><span class="detail-value" style="font-weight:700;color:#1a4a9a">${v.tipo}</span></div>
      <div class="detail-row"><span class="detail-label">Fecha</span><span class="detail-value">${v.fecha}</span></div>
      <div style="margin-top:12px;">
        <span class="detail-label" style="display:block;margin-bottom:4px;">Estado reportado:</span>
        <p style="font-size:14px;background:#fafafa;padding:8px;border-radius:6px;color:#444;">${v.detalle || 'No especificado.'}</p>
      </div>
      <div style="margin-top:12px;">
        <span class="detail-label" style="display:block;margin-bottom:4px;">Trabajo realizado:</span>
        <p style="font-size:14px;background:#fafafa;padding:8px;border-radius:6px;color:#444;">${v.observacion || 'No especificada.'}</p>
      </div>
    </div>
  `;
  
  document.getElementById('btn-compartir-visita').onclick = () => {
    if(v.pdfUrl) { window.open(v.pdfUrl, '_blank'); } 
    else { alert('Esta visita no tiene link de PDF asignado.'); }
  };
}

function goNewClient(){
  editingClientId=null;
  document.getElementById('new-client-title').textContent="Nuevo cliente";
  ['c-nombre','c-telefono','c-direccion','c-marca','c-btu'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('c-tipo').value='';
  goScreen('screen-new-client');
}

function editClient(){
  const c=db.clients.find(x=>x.id===currentClientId); if(!c) return;
  editingClientId=c.id;
  document.getElementById('new-client-title').textContent="Editar cliente";
  document.getElementById('c-nombre').value=c.nombre;
  document.getElementById('c-telefono').value=c.telefono||'';
  document.getElementById('c-direccion').value=c.direccion||'';
  document.getElementById('c-tipo').value=c.tipo||'';
  document.getElementById('c-marca').value=c.marca||'';
  document.getElementById('c-btu').value=c.btu||'';
  goScreen('screen-new-client');
}

function goNewVisit(){
  document.getElementById('v-detalle').value='';
  document.getElementById('v-observacion').value='';
  document.getElementById('v-tipo').value='';
  document.getElementById('v-fecha').value=new Date().toISOString().split('T')[0];
  goScreen('screen-new-visit');
}

// --- ARRANQUE SEGURO ---
(function init(){
  document.getElementById('search-input').addEventListener('input', renderClients);
  document.getElementById('manual-sync-btn').addEventListener('click', fetchDataFromSheets);
  document.getElementById('btn-add-client-fab').addEventListener('click', goNewClient);
  document.getElementById('btn-back-to-home').addEventListener('click', () => goScreen('screen-home'));
  document.getElementById('btn-cancel-client').addEventListener('click', () => goScreen('screen-home'));
  document.getElementById('btn-save-client').addEventListener('click', saveClient);
  document.getElementById('btn-detail-back').addEventListener('click', () => goScreen('screen-home'));
  document.getElementById('btn-edit-client').addEventListener('click', editClient);
  document.getElementById('btn-go-new-visit').addEventListener('click', goNewVisit);
  document.getElementById('btn-visit-back').addEventListener('click', () => goScreen('screen-client-detail'));
  document.getElementById('btn-clear-sig').addEventListener('click', clearSig);
  document.getElementById('btn-guardar-visita').addEventListener('click', saveVisit);
  document.getElementById('btn-cancelar-visita').addEventListener('click', () => goScreen('screen-client-detail'));
  document.getElementById('btn-vdetail-back').addEventListener('click', () => goScreen('screen-client-detail'));
  document.getElementById('btn-delete-visit-btn').addEventListener('click', deleteVisit);

  if(sessionStorage.getItem("lj_logged")==="true"){
    goScreen('screen-home');
    fetchDataFromSheets();
  } else {
    document.getElementById('login-screen').style.display='flex';
  }

  document.getElementById("btn-entrar").onclick=function(){
    const u=document.getElementById("username").value.trim();
    const p=document.getElementById("password").value.trim();
    const box=document.getElementById("login-alert-box");
    if(box) box.style.display="block";
    if(u==="" && p===""){
      if(box) { box.style.backgroundColor="#e6f9f0"; box.style.color="#1a7a4a"; box.textContent="¡Bienvenido! Sincronizando..."; }
      sessionStorage.setItem("lj_logged","true");
      setTimeout(()=>{ document.getElementById('login-screen').style.display='none'; goScreen('screen-home'); fetchDataFromSheets(); },400);
    } else {
      if(box) { box.style.backgroundColor="#ffebeb"; box.style.color="#e53e3e"; box.textContent="❌ Error: Datos incorrectos"; }
    }
  };
})();
</script>
</body>
</html>
