<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Llama a Jhon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;max-width:430px;margin:0 auto;min-height:100vh;}
.screen{display:none;padding:1rem;padding-bottom:5rem;}
.screen.active{display:block;}
.header{display:flex;align-items:center;gap:10px;background:#fff;margin:-1rem -1rem 1.5rem;padding:1rem;position:sticky;top:0;z-index:10;border-bottom:1px solid #e5e5e5;}
.header h1{font-size:18px;font-weight:600;color:#1a1a1a;flex:1;}
.back-btn{background:none;border:none;cursor:pointer;color:#666;font-size:22px;padding:0;display:flex;align-items:center;}
.section-title{font-size:12px;color:#1a1a1a;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;margin-top:1.25rem;}
input,textarea,select{width:100%;padding:11px 14px;border:1px solid #ddd;border-radius:10px;font-size:15px;color:#1a1a1a;background:#fff;font-family:inherit;margin-bottom:10px;outline:none;}
.btn-primary{width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-secondary{width:100%;padding:13px;background:#fff;color:#1a1a1a;border:1px solid #ddd;border-radius:10px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:8px;}
.btn-share{width:100%;padding:13px;background:#25D366;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px;}
.client-card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;}
.client-name{font-size:16px;font-weight:600;color:#1a1a1a;}
.client-meta{font-size:13px;color:#888;margin-top:3px;display:flex;align-items:center;gap:4px;}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:#f0f0f0;color:#555;margin-top:6px;margin-right:4px;}
.fab{position:fixed;bottom:1.5rem;right:1.5rem;width:56px;height:56px;border-radius:50%;background:#1a1a1a;color:#fff;border:none;font-size:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.25);z-index:20;}
.canvas-wrap{border:1px solid #ddd;border-radius:10px;margin-bottom:8px;background:#fff;overflow:hidden;}
canvas#sigCanvas{display:block;touch-action:none;width:100%;height:160px;}
.clear-sig{background:none;border:none;color:#888;font-size:13px;cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:4px;}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.photo-thumb{width:100%;height:100px;object-fit:cover;border-radius:10px;border:1px solid #eee;}
.photo-add{width:100%;height:100px;border:1.5px dashed #ccc;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#aaa;font-size:32px;background:#fafafa;}
.sig-preview{max-width:100%;border-radius:10px;border:1px solid #eee;margin-top:8px;background:#fff;}
.search-wrap{position:relative;margin-bottom:1rem;}
.search-wrap input{padding-left:38px;margin-bottom:0;}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#aaa;font-size:18px;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.stat-card{background:#fff;border-radius:14px;padding:14px;text-align:center;border:1px solid #e5e5e5;}
.stat-num{font-size:28px;font-weight:700;color:#1a1a1a;}
.stat-label{font-size:12px;color:#888;}
.visit-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;}
.visit-tipo{font-size:15px;font-weight:600;color:#1a1a1a;}
.visit-fecha{font-size:13px;color:#888;}
.toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;opacity:0;transition:opacity 0.3s;z-index:100;white-space:nowrap;}
.toast.show{opacity:1;}
.app-logo{width:36px;height:36px;background:#1a1a1a;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;}
.info-card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:14px 16px;margin-bottom:1rem;}
.detail-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:15px;border-bottom:1px dashed #eee;padding-bottom:6px;}
.detail-label{color:#555;font-weight:500;}
.detail-value{color:#1a1a1a;font-weight:600;text-align:right;}
.report-text-box{font-size:15px;color:#1a1a1a;background:#f9f9f9;padding:10px 12px;border-radius:8px;margin-bottom:12px;border:1px solid #f0f0f0;line-height:1.4;}
.sync-indicator { font-size: 11px; color: #888; display: flex; align-items: center; gap: 4px; justify-content: center; margin-bottom: 10px; }
.sync-spin { animation: spin 1s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- LOGIN -->
<div id="login-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column;">
    <div style="background: #ffffff; padding: 30px; border-radius: 14px; text-align: center; width: 85%; max-width: 350px;">
        <h2 style="margin-bottom: 5px; color: #1a1a1a; font-weight: 700;">Llama a Jhon</h2>
        <p style="font-size: 13px; color: #888; margin-bottom: 25px;">Control de Clientes</p>
        <button id="btn-entrar" style="width:100%; padding:13px; background:#1a1a1a; color:#fff; border:none; border-radius:10px; font-weight:600; font-size:15px; cursor:pointer;">Ingresar a la App</button>
    </div>
</div>

<!-- INICIO -->
<div id="screen-home" class="screen active">
  <div class="header">
    <div class="app-logo"><i class="ti ti-tool"></i></div>
    <h1>Llama a Jhon</h1>
    <i class="ti ti-refresh" style="font-size:20px;color:#1a4a9a;cursor:pointer;" onclick="fetchDataFromSheets()"></i>
  </div>
  
  <div id="sync-status" class="sync-indicator">Conectando...</div>

  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="total-clients">0</div><div class="stat-label">Clientes</div></div>
    <div class="stat-card"><div class="stat-num" id="total-visits">0</div><div class="stat-label">Servicios</div></div>
  </div>
  <div class="search-wrap">
    <i class="ti ti-search"></i>
    <input type="text" id="search-input" placeholder="Buscar cliente..." oninput="renderClients()">
  </div>
  <div id="client-list"></div>
  <button class="fab" onclick="goNewClient()"><i class="ti ti-plus"></i></button>
</div>

<!-- NUEVO CLIENTE -->
<div id="screen-new-client" class="screen">
  <div class="header">
    <button class="back-btn" onclick="goScreen('screen-home')"><i class="ti ti-arrow-left"></i></button>
    <h1>Nuevo Cliente</h1>
  </div>
  <input type="text" id="c-nombre" placeholder="Nombre completo">
  <input type="tel" id="c-telefono" placeholder="Teléfono">
  <input type="text" id="c-direccion" placeholder="Dirección">
  <select id="c-tipo">
    <option value="">Tipo de aire acondicionado</option>
    <option>Split</option><option>Central</option><option>Ventana</option><option>Otro</option>
  </select>
  <input type="text" id="c-marca" placeholder="Marca (ej. LG, TCL)">
  <input type="text" id="c-btu" placeholder="Capacidad/BTU (ej. 12000)">
  <button class="btn-primary" onclick="saveClient()">Guardar Cliente</button>
  <button class="btn-secondary" onclick="goScreen('screen-home')"><i class="ti ti-home"></i> Cancelar</button>
</div>

<!-- DETALLE CLIENTE -->
<div id="screen-client-detail" class="screen">
  <div class="header">
    <button class="back-btn" onclick="goScreen('screen-home')"><i class="ti ti-arrow-left"></i></button>
    <h1 id="client-detail-name">Cliente</h1>
    <i class="ti ti-home" style="font-size:22px; color:#666; cursor:pointer;" onclick="goScreen('screen-home')"></i>
  </div>
  <div class="info-card" id="client-detail-info"></div>
  <button class="btn-primary" onclick="goNewVisit()"><i class="ti ti-plus"></i> Registrar Nuevo Trabajo</button>
  <div class="section-title" style="margin-top:1.5rem">Historial de Reportes</div>
  <div id="visit-list"></div>
</div>

<!-- NUEVA VISITA -->
<div id="screen-new-visit" class="screen">
  <div class="header">
    <button class="back-btn" onclick="goScreen('screen-client-detail')"><i class="ti ti-arrow-left"></i></button>
    <h1>Registrar Trabajo</h1>
  </div>
  <input type="date" id="v-fecha">
  <select id="v-tipo">
    <option value="">Tipo de servicio</option>
    <option>Limpieza</option><option>Revisión técnica</option><option>Instalación</option><option>Fuga de gas</option>
  </select>
  <textarea id="v-detalle" placeholder="Diagnóstico (ej: está sucio y gotea)"></textarea>
  <textarea id="v-observacion" placeholder="Observación (ej: se hizo limpieza profunda)"></textarea>
  
  <div class="section-title">Evidencias Fotográficas</div>
  <div class="photo-grid" id="photo-grid"></div>
  <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="addPhotos(this)">
  
  <div class="section-title">Firma del cliente</div>
  <div class="canvas-wrap"><canvas id="sigCanvas"></canvas></div>
  <button class="clear-sig" onclick="clearSig()"><i class="ti ti-trash"></i> Borrar Firma</button>
  
  <button class="btn-primary" onclick="saveVisit()" style="margin-top:1rem">Guardar Reporte</button>
</div>

<!-- VER VISITA -->
<div id="screen-visit-detail" class="screen">
  <div class="header" id="visit-detail-header">
    <button class="back-btn" onclick="goScreen('screen-client-detail')"><i class="ti ti-arrow-left"></i></button>
    <h1>Detalle de visita</h1>
    <i class="ti ti-home" style="font-size:22px; color:#666; cursor:pointer;" onclick="goScreen('screen-home')"></i>
  </div>
  <div id="visit-detail-content"></div>
  <button id="btn-whatsapp-share" class="btn-share" onclick="shareCurrentVisitReport()"><i class="ti ti-brand-whatsapp"></i> Compartir por WhatsApp</button>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzcZ8Y_jbUTY5goLeF_lAYgJo8SmNNE4MM8nRi0qcXu4SuRlJEe2U20j9CSUWLeo04YbQ/exec';

let db = JSON.parse(localStorage.getItem('lj_db') || '{"clients":[],"visits":[]}');
let currentClientId=null, currentVisitId=null, visitPhotos=[], sigCtx, sigDrawing=false, sigHasContent=false;

function getVal(obj, keys) {
  if (!obj) return '';
  const objKeys = Object.keys(obj);
  const cleanStr = (s) => String(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
  for (let targetKey of keys) {
    let cleanTarget = cleanStr(targetKey);
    for (let actualKey of objKeys) { if (cleanStr(actualKey) === cleanTarget) return obj[actualKey]; }
  }
  return '';
}

function saveDb(){ localStorage.setItem('lj_db', JSON.stringify(db)); }

function fetchDataFromSheets() {
  fetch(`${SHEET_URL}`)
    .then(res => res.json())
    .then(data => {
      db = data; saveDb(); renderClients();
      document.getElementById('sync-status').innerHTML = `<i class="ti ti-cloud-check" style="color:#1a7a4a"></i> Base de datos al día`;
      document.getElementById('total-clients').textContent = db.clients.length;
      document.getElementById('total-visits').textContent = db.visits.length;
    })
    .catch(() => { document.getElementById('sync-status').innerHTML = `Modo local (Sin conexión)`; });
}

function saveClient(){
  const d = { type: 'client', ID: 'c_' + Date.now(), Nombre: document.getElementById('c-nombre').value, Teléfono: document.getElementById('c-telefono').value, Dirección: document.getElementById('c-direccion').value, Tipo: document.getElementById('c-tipo').value, Marca: document.getElementById('c-marca').value, BTU: document.getElementById('c-btu').value };
  fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) }).then(() => { fetchDataFromSheets(); goScreen('screen-home'); });
}

function saveVisit(){
  const d = { type: 'visit', ID: 'v_' + Date.now(), ClienteID: currentClientId, Fecha: document.getElementById('v-fecha').value, Tipo: document.getElementById('v-tipo').value, Detalle: document.getElementById('v-detalle').value, Observación: document.getElementById('v-observacion').value };
  fetch(SHEET_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(d) }).then(() => { fetchDataFromSheets(); goScreen('screen-client-detail'); });
}

function goScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='screen-home') renderClients();
  if(id==='screen-client-detail') renderClientDetail();
  if(id==='screen-new-visit') initSig();
}

function renderClients(){
  const q = document.getElementById('search-input').value.toLowerCase();
  const list = document.getElementById('client-list');
  list.innerHTML = db.clients.filter(c => getVal(c, ['Nombre', 'nombre']).toLowerCase().includes(q)).map(c => `
    <div class="client-card" onclick="openClient('${getVal(c, ['ID', 'id'])}')">
      <div class="client-name">${getVal(c, ['Nombre', 'nombre'])}</div>
      <div class="client-meta"><i class="ti ti-phone"></i> ${getVal(c, ['Teléfono', 'telefono'])}</div>
    </div>`).join('');
}

function openClient(id){ currentClientId = id; goScreen('screen-client-detail'); }

function renderClientDetail(){
  const c = db.clients.find(x => getVal(x, ['ID', 'id']) === currentClientId);
  document.getElementById('client-detail-name').textContent = getVal(c, ['Nombre', 'nombre']);
  document.getElementById('client-detail-info').innerHTML = `<div class="detail-row"><span class="detail-label">Celular:</span><span class="detail-value">${getVal(c, ['Teléfono', 'telefono'])}</span></div>`;
  document.getElementById('visit-list').innerHTML = db.visits.filter(v => getVal(v, ['ClienteID', 'clienteid']) === currentClientId).map(v => `
    <div class="visit-card" onclick="alert('Reporte: ${getVal(v, ['Detalle', 'detalle'])}')">
      <div class="visit-tipo">${getVal(v, ['Tipo', 'tipo'])}</div>
      <div class="visit-fecha">${getVal(v, ['Fecha', 'fecha'])}</div>
    </div>`).join('');
}

function initSig(){ const canvas = document.getElementById('sigCanvas'); canvas.width = canvas.parentElement.clientWidth; canvas.height = 160; sigCtx = canvas.getContext('2d'); sigCtx.strokeStyle = '#1a1a1a'; sigCtx.lineWidth = 2.5; }
function clearSig(){ sigCtx.clearRect(0,0,500,200); }
function goNewClient(){ goScreen('screen-new-client'); }
function goNewVisit(){ goScreen('screen-new-visit'); document.getElementById('v-fecha').value = new Date().toISOString().split('T')[0]; }

document.addEventListener("DOMContentLoaded", function() {
  if (sessionStorage.getItem("lj_logged") === "true") { document.getElementById("login-screen").style.display = "none"; fetchDataFromSheets(); }
  document.getElementById("btn-entrar").onclick = () => { sessionStorage.setItem("lj_logged", "true"); document.getElementById("login-screen").style.display = "none"; fetchDataFromSheets(); };
});
</script>
</body>
</html>
