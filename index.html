<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Llama a Jhon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
/* MANTENGO TUS ESTILOS ORIGINALES EXACTAMENTE IGUALES */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;max-width:430px;margin:0 auto;min-height:100vh;}
.screen{display:none;padding:1rem;padding-bottom:5rem;}
.screen.active{display:block;}
.header{display:flex;align-items:center;gap:10px;background:#fff;margin:-1rem -1rem 1.5rem;padding:1rem;position:sticky;top:0;z-index:10;border-bottom:1px solid #e5e5e5;}
.header h1{font-size:18px;font-weight:600;color:#1a1a1a;flex:1;}
.back-btn{background:none;border:none;cursor:pointer;color:#666;font-size:22px;padding:0;display:flex;align-items:center;}
.section-title{font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;margin-top:1.25rem;}
.section-title:first-child{margin-top:0;}
input[type=text],input[type=tel],input[type=date],input[type=password],textarea,select{width:100%;padding:11px 14px;border:1px solid #ddd;border-radius:10px;font-size:15px;color:#1a1a1a;background:#fff;font-family:inherit;margin-bottom:10px;outline:none;-webkit-appearance:none;appearance:none;}
.btn-primary{width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;}
.btn-primary:disabled{background:#aaa;cursor:not-allowed;}
.btn-secondary{width:100%;padding:13px;background:#fff;color:#1a1a1a;border:1px solid #ddd;border-radius:10px;font-size:15px;cursor:pointer;margin-top:8px;font-family:inherit;}
.btn-danger{width:100%;padding:13px;background:#fff;color:#e53e3e;border:1px solid #e53e3e;border-radius:10px;font-size:15px;cursor:pointer;margin-top:8px;font-family:inherit;}
.btn-share{width:100%;padding:14px;background:#1a7a4a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-home{width:100%;padding:13px;background:#f0f0f0;color:#1a1a1a;border:none;border-radius:10px;font-size:15px;cursor:pointer;margin-top:8px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-switch{width:100%;padding:11px;background:#fff;color:#888;border:1px solid #ddd;border-radius:10px;font-size:13px;cursor:pointer;margin-top:8px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;}
.client-card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;}
.client-name{font-size:16px;font-weight:600;color:#1a1a1a;}
.client-meta{font-size:13px;color:#888;margin-top:3px;}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:#f0f0f0;color:#555;margin-top:6px;margin-right:4px;}
.fab{position:fixed;bottom:1.5rem;right:1.5rem;width:56px;height:56px;border-radius:50%;background:#1a1a1a;color:#fff;border:none;font-size:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.25);z-index:20;}
.canvas-wrap{border:1px solid #ddd;border-radius:10px;margin-bottom:8px;background:#fff;overflow:hidden;}
canvas#sigCanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:160px;}
.clear-sig{background:none;border:none;color:#888;font-size:13px;cursor:pointer;padding:4px 0;font-family:inherit;display:flex;align-items:center;gap:4px;}
.empty-state{text-align:center;padding:3rem 1rem;color:#aaa;}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px;}
.detail-label{color:#888;flex-shrink:0;margin-right:12px;}
.detail-value{color:#1a1a1a;font-weight:500;text-align:right;}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.photo-thumb{width:100%;height:100px;object-fit:cover;border-radius:10px;border:1px solid #eee;}
.photo-add{width:100%;height:100px;border:1.5px dashed #ccc;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#aaa;font-size:32px;background:#fafafa;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.stat-card{background:#fff;border-radius:14px;padding:14px;text-align:center;border:1px solid #e5e5e5;}
.stat-num{font-size:28px;font-weight:700;color:#1a1a1a;}
.stat-label{font-size:12px;color:#888;margin-top:2px;}
.visit-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;}
.visit-tipo{font-size:15px;font-weight:600;color:#1a1a1a;margin-top:2px;}
.visit-fecha{font-size:13px;color:#888;}
.toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:200;}
.toast.show{opacity:1;}
.saved-banner{background:#e6f9f0;border:1px solid #b2dfcb;border-radius:12px;padding:14px;text-align:center;color:#1a7a4a;font-weight:600;font-size:15px;margin-bottom:12px;display:none;}
.saved-banner.show{display:block;}
.sync-indicator{font-size:11px;color:#888;display:flex;align-items:center;gap:4px;justify-content:center;margin-bottom:10px;}
/* LOGIN Y CHECKBOX */
#login-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#1a1a1a;z-index:9999;display:flex;justify-content:center;align-items:center;flex-direction:column;}
.login-box{background:#fff;padding:30px;border-radius:14px;text-align:center;width:85%;max-width:350px;}
.user-selector{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.user-btn{padding:12px;border:2px solid #ddd;border-radius:10px;background:#fff;cursor:pointer;font-weight:600;}
.user-btn.selected{border-color:#1a1a1a;background:#1a1a1a;color:#fff;}
.checkbox-item{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid #ddd;border-radius:10px;padding:12px;margin-bottom:10px;cursor:pointer;}
.checkbox-item input{width:20px;height:20px;cursor:pointer;}
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<!-- ... (MANTENGO EL RESTO DE TU ESTRUCTURA HTML TAL CUAL) ... -->
<!-- Nota: Se han eliminado las checkbox viejas de 'Tipo de trabajo' y agregado el deslinde -->

<!-- [LOGIN, HOME, ETC. CONTINÚAN IGUAL HASTA EL FORMULARIO DE VISITA] -->

<div id="screen-new-visit" class="screen">
  <div class="header">
    <button class="back-btn" onclick="goScreen('screen-client-detail')"><i class="ti ti-arrow-left"></i></button>
    <h1 id="new-visit-title">Nueva visita</h1>
  </div>

  <div class="saved-banner" id="saved-banner">✅ Visita guardada correctamente</div>
  
  <div id="visit-form">
    <div class="section-title">Información</div>
    <input type="date" id="v-fecha">
    <select id="v-tipo">
      <option value="">Tipo de servicio</option>
      <option>Instalación</option><option>Limpieza</option><option>Revisión técnica</option>
      <option>Fuga de gas</option><option>Mantenimiento preventivo</option><option>Reparación</option><option>Otro</option>
    </select>

    <div class="section-title">Detalle del equipo</div>
    <textarea id="v-detalle" placeholder="¿Qué tenía el aire? Estado del equipo..."></textarea>
    <div class="section-title">Observación</div>
    <textarea id="v-observacion" placeholder="¿Qué se resolvió? Trabajo realizado..."></textarea>

    <div class="section-title">Responsabilidad</div>
    <label class="checkbox-item">
      <input type="checkbox" id="v-deslinde-check">
      <span style="font-size:13px;">He sido informado de los riesgos técnicos y acepto la responsabilidad absoluta sobre cualquier falla derivada del servicio prestado.</span>
    </label>

    <div class="section-title">Fotos</div>
    <div class="photo-grid" id="photo-grid"></div>
    <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="addPhotos(this)">

    <div class="section-title">Firma del cliente</div>
    <div class="canvas-wrap"><canvas id="sigCanvas"></canvas></div>
    <button class="clear-sig" onclick="clearSig()"><i class="ti ti-trash"></i> Limpiar firma</button>

    <button class="btn-primary" id="btn-guardar-visita" onclick="saveVisit()">Guardar visita</button>
  </div>
</div>

<script>
const USERS = {
  jhon:  { pass:'jhon2024',  label:'Llama a Jhon',   color:'#1a4a9a', icon:'ti-tool', sheetUrl:'https://script.google.com/macros/s/AKfycbzP4714lVYGCS3N992eIonN2o2spXKGvIl4i2tHo---PuGhBhjcHWWDqt7c5_czatf6/exec' },
  thermo:{ pass:'thermo2024',label:'Thermoelectric', color:'#9a4a1a', icon:'ti-snowflake', sheetUrl:'https://script.google.com/macros/s/AKfycbzePKw2vbFId4-wePXANI6soNGNtGXyMAsje5lIUP3ju3iAke37o6C6PSr4h2x9GI-8/exec' }
};

let currentUser = null;

// LÓGICA DE SINCRONIZACIÓN CORREGIDA
function syncToSheets(data){
  if(!currentUser) return;
  // Validamos si el deslinde fue aceptado (solo para visitas)
  if(data.type === 'visit' && !document.getElementById('v-deslinde-check').checked){
    alert('Debes aceptar el deslinde de responsabilidad');
    return;
  }
  
  const params = new URLSearchParams();
  Object.keys(data).forEach(k => { if(k!=='fotos') params.append(k, data[k]||''); });
  
  // Enviar a la URL del usuario activo
  fetch(currentUser.sheetUrl + '?' + params.toString(), {mode:'no-cors'})
    .then(() => console.log("Sincronizado con: " + currentUser.label))
    .catch(err => console.error("Error:", err));
}

function saveVisit(){
  if(!document.getElementById('v-deslinde-check').checked){
    alert('Por favor, acepta el deslinde de responsabilidad antes de continuar.');
    return;
  }
  // ... resto de tu lógica de guardado normal ...
  alert('Guardado exitosamente en ' + currentUser.label);
}
// ... (resto de tus funciones permanecen igual)
</script>
</body>
</html>
