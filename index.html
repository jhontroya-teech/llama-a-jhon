<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<body>
<!-- ... (Estructura HTML original con ajustes solicitados) ... -->

<div id="screen-home" class="screen active">
  <div class="header">
    <div class="app-logo" id="home-logo" style="background:#1a1a1a;color:#fff;width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;"><i class="ti ti-tool"></i></div>
    <h1 id="home-title">Llama a Jhon</h1>
    <i class="ti ti-user-circle" style="font-size:24px;cursor:pointer;" onclick="switchUser()"></i>
  </div>
  <!-- ... (resto del home) ... -->
</div>

<!-- NUEVA VISITA REORDENADA -->
<div id="screen-new-visit" class="screen">
  <div class="header">
    <button class="back-btn" onclick="goScreen('screen-client-detail')"><i class="ti ti-arrow-left"></i></button>
    <h1 id="new-visit-title">Nueva visita</h1>
  </div>

  <div id="visit-form">
    <div class="section-title">Información</div>
    <input type="date" id="v-fecha">
    <select id="v-tipo">
      <option value="">Tipo de servicio</option>
      <option>Instalación</option><option>Limpieza</option><option>Revisión técnica</option>
      <option>Fuga de gas</option><option>Mantenimiento preventivo</option>
      <option>Reparación</option><option>Otro</option>
    </select>

    <div class="section-title">Detalle del equipo</div>
    <textarea id="v-detalle" placeholder="Detalles del equipo..."></textarea>
    
    <div class="section-title">Observación</div>
    <textarea id="v-observacion" placeholder="Trabajo realizado..."></textarea>

    <div class="section-title">Evidencias</div>
    <div class="photo-grid" id="photo-grid"><div class="photo-add" onclick="document.getElementById('photo-input').click()">+</div></div>
    <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="addPhotos(this)">

    <div class="section-title">Responsabilidad</div>
    <div class="checkbox-item" style="border:none;background:#fffaf0;border:1px solid #ffe8cc;">
      <input type="checkbox" id="v-deslinde-check" required>
      <label for="v-deslinde-check" style="font-size:13px;">He sido informado de los riesgos técnicos y, bajo mi propia voluntad, acepto la responsabilidad absoluta sobre los daños o fallas que puedan derivarse de esta instalación o servicio.</label>
    </div>

    <div class="section-title">Firma del cliente</div>
    <div class="canvas-wrap"><canvas id="sigCanvas"></canvas></div>
    <button class="clear-sig" onclick="clearSig()"><i class="ti ti-trash"></i> Limpiar firma</button>

    <button class="btn-primary" id="btn-guardar-visita" onclick="saveVisit()">Guardar visita</button>
  </div>
</div>

<script>
// ── CONFIGURACIÓN DE USUARIOS CON SUS BASES DE DATOS ──
const USERS = {
  jhon: { 
    pass:'jhon2024', label:'Llama a Jhon', color:'#1a4a9a', icon:'ti-tool', 
    sheetUrl:'https://script.google.com/macros/s/AKfycbzP4714lVYGCS3N992eIonN2o2spXKGvIl4i2tHo---PuGhBhjcHWWDqt7c5_czatf6/exec' 
  },
  thermo:{ 
    pass:'thermo2024', label:'Thermoelectric', color:'#9a4a1a', icon:'ti-snowflake', 
    sheetUrl:'https://script.google.com/macros/s/AKfycbzePKw2vbFId4-wePXANI6soNGNtGXyMAsje5lIUP3ju3iAke37o6C6PSr4h2x9GI-8/exec' 
  }
};

// ... (El resto de la lógica de guardado y sync actualizada) ...

function saveVisit(){
    // Validar checkbox de responsabilidad
    if(!document.getElementById('v-deslinde-check').checked){
        showToast('Debes aceptar la responsabilidad');
        return;
    }
    // ... (lógica de guardado existente) ...
}

function compartirVisita(){
    // Lógica corregida para generar el link de reporte correctamente
    const v = db.visits.find(x=>x.id===currentVisitId);
    const link = window.location.origin + window.location.pathname + '?reporte=' + btoa(encodeURIComponent(JSON.stringify(v)));
    const msg = `Reporte de Servicio: ${v.tipo}\n${link}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`);
}
</script>
</body>
</html>
