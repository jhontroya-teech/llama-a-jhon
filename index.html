<script>
// CONFIGURACIÓN
const SHEET_URL = 'https://script.google.com/macros/s/AKfycby3cBIeNUMFWl9IjFmAApKiZ00TeV3Fc0SLjFsQZ9znORQy-RocbCDMftP7Vh2brYHekQ/exec';

// FUNCIÓN SAVEVISIT INTEGRADA Y ACTUALIZADA
async function saveVisit() {
  const tipo = document.getElementById('v-tipo').value;
  const fecha = document.getElementById('v-fecha').value;
  if (!tipo) { showToast('Selecciona el tipo de servicio'); return; }

  const btn = document.getElementById('btn-guardar-visita');
  btn.disabled = true;
  btn.textContent = 'Subiendo archivos...';

  // 1. Preparar archivos (fotos + firma)
  const filesToUpload = [];
  visitPhotos.forEach((p, i) => {
    filesToUpload.push({ name: 'Foto_' + i + '.png', base64: p });
  });
  if (sigHasContent) {
    filesToUpload.push({ name: 'Firma.png', base64: document.getElementById('sigCanvas').toDataURL() });
  }

  // 2. Subir a Drive mediante doPost (acción saveFiles)
  let photoUrls = [];
  try {
    const response = await fetch(SHEET_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveFiles', files: filesToUpload })
    });
    const result = await response.json();
    if (result.success) photoUrls = result.urls;
  } catch (err) { console.error("Error subiendo archivos:", err); }

  // 3. Preparar datos para el Excel
  const data = {
    type: 'visit',
    id: editingVisitId || 'v_' + Date.now(),
    clientId: currentClientId,
    fecha: fecha,
    tipo: tipo,
    fotos_count: photoUrls.length,
    links_fotos: photoUrls.join('|'),
    tiene_firma: photoUrls.some(u => u.includes('Firma')) ? 'Si' : 'No'
  };

  // 4. Guardar en BD local
  if (editingVisitId) {
    const idx = db.visits.findIndex(x => x.id === editingVisitId);
    db.visits[idx] = { ...db.visits[idx], ...data };
  } else {
    db.visits.push(data);
  }
  saveDb();

  // 5. Sincronizar al Excel (vía GET)
  const params = new URLSearchParams(data);
  fetch(`${SHEET_URL}?${params.toString()}`, { mode: 'no-cors' });

  // UI Feedback
  document.getElementById('saved-banner').classList.add('show');
  document.getElementById('visit-form').style.display = 'none';
  document.getElementById('post-save-btns').style.display = 'block';
  btn.textContent = 'Guardado';
  showToast('Visita guardada en Drive y Excel');
}

// ... (MANTÉN EL RESTO DE TUS FUNCIONES: renderPhotoGrid, initSig, etc.) ...
</script>
