<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Llama a Jhon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
    body { font-family: sans-serif; background: #f5f5f5; max-width: 430px; margin: 0 auto; padding: 1rem; }
    .card { background: #fff; padding: 1rem; border-radius: 15px; margin-bottom: 1rem; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .btn-main { background: #1a1a1a; color: white; padding: 15px; border-radius: 10px; text-align: center; display: block; margin-top: 10px; text-decoration: none; }
    .img-preview { width: 100%; border-radius: 10px; margin-top: 10px; }
    .hidden { display: none; }
</style>
</head>
<body>

<!-- PANTALLA PRINCIPAL -->
<div id="main-screen">
    <div class="card">
        <h2><i class="ti ti-tool"></i> Llama a Jhon</h2>
        <div style="display:flex; gap:10px;">
            <div class="card">12 Clientes</div>
            <div class="card">10 Servicios</div>
        </div>
    </div>
    <div id="client-list"></div>
</div>

<!-- PANTALLA DE DETALLE (La que sale en tus fotos) -->
<div id="detail-screen" class="hidden">
    <button onclick="goBack()" style="background:none; border:none; font-size:20px;"><i class="ti ti-arrow-left"></i></button>
    <div id="client-detail-content"></div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxnEO3E0duFo0kaZgeJwg-zLLPXqiiOLGiHLhsPqQxCgBqeWU0pMNYri27yduNbfe3npA/exec';
let db = {clients:[], visits:[]};

function fetchData() {
    fetch(SHEET_URL).then(res => res.json()).then(data => { db = data; renderClients(); });
}

function renderClients() {
    document.getElementById('client-list').innerHTML = db.clients.map(c => `
        <div class="card" onclick="showDetail('${c.ID}')">
            <b>${c.Nombre}</b><br>Split | ${db.visits.filter(v => v.ClienteID == c.ID).length} servicios
        </div>
    `).join('');
}

function showDetail(id) {
    const c = db.clients.find(x => x.ID == id);
    const reports = db.visits.filter(v => v.ClienteID == id);
    document.getElementById('main-screen').classList.add('hidden');
    document.getElementById('detail-screen').classList.remove('hidden');
    
    let html = `<h3>${c.Nombre}</h3>
                <div class="card">Celular: ${c.Teléfono || '---'}<br>Dir: ${c.Dirección || '---'}</div>
                <button class="btn-main">+ Registrar Nuevo Trabajo</button>
                <h4>HISTORIAL DE REPORTES</h4>`;
    
    reports.forEach(r => {
        html += `<div class="card" onclick="showReport('${r.ID}')">
                    <b>${r.Tipo}</b><br>${r.Fecha}
                 </div>`;
    });
    document.getElementById('client-detail-content').innerHTML = html;
}

function showReport(reportId) {
    const r = db.visits.find(x => x.ID == reportId);
    let html = `<h3>Detalle de visita</h3>
                <div class="card">
                    <b>${r.Tipo}</b><br>Fecha: ${r.Fecha}<br><br>
                    DIAGNÓSTICO:<br>${r.Observación}<br><br>
                    <img src="${r.FotoURL}" class="img-preview">
                </div>
                <a href="https://wa.me/?text=Reporte: ${r.Tipo} - ${r.Observación}" class="btn-main">Compartir Reporte</a>`;
    document.getElementById('client-detail-content').innerHTML = html;
}

function goBack() {
    document.getElementById('main-screen').classList.remove('hidden');
    document.getElementById('detail-screen').classList.add('hidden');
}

fetchData();
</script>
</body>
</html>
