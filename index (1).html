<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Llama a Jhon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;max-width:430px;margin:0 auto;min-height:100vh;}
.screen{display:none;padding:1rem;padding-bottom:5rem;}
.screen.active{display:block;}
.header{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem;background:#fff;margin:-1rem -1rem 1.5rem;padding:1rem;position:sticky;top:0;z-index:10;border-bottom:1px solid #e5e5e5;}
.header h1{font-size:18px;font-weight:600;color:#1a1a1a;flex:1;}
.back-btn{background:none;border:none;cursor:pointer;color:#666;font-size:22px;padding:0;display:flex;align-items:center;}
.section-title{font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;margin-top:1.25rem;}
.section-title:first-child{margin-top:0;}
input,textarea,select{width:100%;padding:11px 14px;border:1px solid #ddd;border-radius:10px;font-size:15px;color:#1a1a1a;background:#fff;font-family:inherit;margin-bottom:10px;outline:none;-webkit-appearance:none;appearance:none;}
input:focus,textarea:focus,select:focus{border-color:#1a1a1a;}
textarea{min-height:85px;resize:vertical;}
.btn-primary{width:100%;padding:13px;background:#1a1a1a;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;font-family:inherit;}
.btn-secondary{width:100%;padding:13px;background:#fff;color:#1a1a1a;border:1px solid #ddd;border-radius:10px;font-size:15px;cursor:pointer;margin-top:8px;font-family:inherit;}
.btn-danger{width:100%;padding:13px;background:#fff;color:#e53e3e;border:1px solid #e53e3e;border-radius:10px;font-size:15px;cursor:pointer;margin-top:8px;font-family:inherit;}
.client-card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;}
.client-name{font-size:16px;font-weight:600;color:#1a1a1a;}
.client-meta{font-size:13px;color:#888;margin-top:3px;}
.badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:#f0f0f0;color:#555;margin-top:6px;margin-right:4px;}
.badge.signed{background:#e6f9f0;color:#1a7a4a;}
.badge.synced{background:#e6f0ff;color:#1a4a9a;}
.fab{position:fixed;bottom:1.5rem;right:1.5rem;width:56px;height:56px;border-radius:50%;background:#1a1a1a;color:#fff;border:none;font-size:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.25);z-index:20;}
.canvas-wrap{border:1px solid #ddd;border-radius:10px;margin-bottom:8px;background:#fff;overflow:hidden;}
canvas#sigCanvas{display:block;touch-action:none;cursor:crosshair;width:100%;height:160px;}
.clear-sig{background:none;border:none;color:#888;font-size:13px;cursor:pointer;padding:4px 0;font-family:inherit;display:flex;align-items:center;gap:4px;}
.empty-state{text-align:center;padding:3rem 1rem;color:#aaa;}
.empty-state i{font-size:52px;display:block;margin-bottom:1rem;}
.detail-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px;}
.detail-row:last-child{border-bottom:none;}
.detail-label{color:#888;flex-shrink:0;margin-right:12px;}
.detail-value{color:#1a1a1a;font-weight:500;text-align:right;word-break:break-word;}
.photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.photo-thumb{width:100%;height:100px;object-fit:cover;border-radius:10px;border:1px solid #eee;}
.photo-add{width:100%;height:100px;border:1.5px dashed #ccc;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#aaa;font-size:32px;background:#fafafa;}
.sig-preview{max-width:100%;border-radius:10px;border:1px solid #eee;margin-top:8px;}
.search-wrap{position:relative;margin-bottom:1rem;}
.search-wrap input{padding-left:38px;margin-bottom:0;}
.search-wrap i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#aaa;font-size:18px;}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem;}
.stat-card{background:#fff;border-radius:14px;padding:14px;text-align:center;border:1px solid #e5e5e5;}
.stat-num{font-size:28px;font-weight:700;color:#1a1a1a;}
.stat-label{font-size:12px;color:#888;margin-top:2px;}
.visit-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:12px 14px;margin-bottom:8px;cursor:pointer;}
.visit-num{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:0.5px;}
.visit-tipo{font-size:15px;font-weight:600;color:#1a1a1a;margin-top:2px;}
.visit-fecha{font-size:13px;color:#888;}
.toast{position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 22px;border-radius:22px;font-size:13px;font-weight:500;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100;white-space:nowrap;}
.toast.show{opacity:1;}
.app-logo{width:36px;height:36px;background:#1a1a1a;border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;flex-shrink:0;}
.info-card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:14px 16px;margin-bottom:1rem;}
.sync-bar{background:#e6f0ff;border-radius:10px;padding:10px 14px;margin-bottom:1rem;font-size:13px;color:#1a4a9a;display:flex;align-items:center;gap:8px;}
.sync-bar.error{background:#fff0f0;color:#e53e3e;}
.sync-bar.success{background:#e6f9f0;color:#1a7a4a;}
</style>
</head>
<body>
<div id="toast" class="toast"></div>

<div id="screen-home" class="screen active">
  <div class="header">
    <div class="app-logo"><i class="ti ti-tool"></i></div>
    <h1>Llama a Jhon</h1>
    <i class="ti ti-cloud" style="font-size:20px;color:#1a4a9a;" title="Conectado a Google Sheets"></i>
  </div>
  <div id="sync-status"></div>
  <div class="stats">
    <div class="stat-card"><div class="stat-num" id="total-clients">0</div><div class="stat-label">Clientes</div></div>
    <div class="stat-card"><div class="stat-num" id="total-visits">0</div><div class="stat-label">Visitas</div></div>
  </div>
  <div class="search-wrap">
    <i class="ti ti-search"></i>
    <input type="text" id="search-input" placeholder="Buscar cliente..." oninput="renderClients()">
  </div>
  <div id="client-list"></div>
  <button class="fab" onclick="goNewClient()"><i class="ti ti-plus"></i></button>
</div>

<div id="screen-new-client" class="screen">
  <div class="header">
    <button class="back-btn" onclick="goScreen('screen-home')"><i class="ti ti-arrow-left"></i></button>
    <h1 id="new-client-title">Nuevo cliente</h1>
  </div>
  <div class="section-title">Datos personales</div>
  <input type="text" id="c-nombre" placeholder="Nombre completo">
  <input type="tel" id="c-telefono" placeholder="Teléfono">
  <input type="text" id="c-direccion" placeholder="Dirección">
  <div class="section-title">Equipo</div>
  <select id="c-tipo">
    <option value="">Tipo de aire acondicionado</option>
    <option>Split</option><option>Central</option><option>Ventana</option>
    <option>Mini split</option><option>Cassette</option><option>Otro</option>
  </select>
  <input type="text" id="c-marca" placeholder="Marca y modelo (opcional)">
  <input type="text" id="c-btu" placeholder="BTU / Capacidad (opcional)">
  <button class="btn-primary" onclick="saveClient()">Guardar cliente</button>
  <button class="btn-secondary" onclick="goScreen('screen-home')">Cancelar</button>
</div>

<div id="screen-client-detail" class="screen">
  <div class="header">
    <button class="back-btn" onclick="goScreen('screen-home')"><i class="ti ti-arrow-left"></i></button>
    <h1 id="client-detail-name">Cliente</h1>
  </div>
  <div class="info-card" id="client-detail-info"></div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
    <button class="btn-secondary" style="margin-top:0" onclick="editClient()"><i class="ti ti-edit"></i> Editar</button>
    <button class="btn-primary" style="margin-top:0" onclick="goNewVisit()"><i class="ti ti-plus"></i> Visita</button>
  </div>
  <div class="section-title" style="margin-top:1.5rem">Historial de visitas</div>
  <div id="visit-list"></div>
</div>

<div id="screen-new-visit" class="screen">
  <div class="header">
    <button class="back-btn" onclick="goScreen('screen-client-detail')"><i class="ti ti-arrow-left"></i></button>
    <h1 id="new-visit-title">Nueva visita</h1>
  </div>
  <div class="section-title">Información</div>
  <input type="date" id="v-fecha">
  <select id="v-tipo">
    <option value="">Tipo de servicio</option>
    <option>Instalación</option><option>Limpieza</option><option>Revisión técnica</option>
    <option>Fuga de gas</option><option>Mantenimiento preventivo</option>
    <option>Reparación</option><option>Otro</option>
  </select>
  <div class="section-title">Detalle del equipo</div>
  <textarea id="v-detalle" placeholder="¿Qué tenía el aire? Estado del equipo..."></textarea>
  <div class="section-title">Observación</div>
  <textarea id="v-observacion" placeholder="¿Qué se resolvió? Trabajo realizado..."></textarea>
  <div class="section-title">Fotos</div>
  <div class="photo-grid" id="photo-grid"></div>
  <input type="file" id="photo-input" accept="image/*" multiple style="display:none" onchange="addPhotos(this)">
  <div class="section-title">Firma del cliente</div>
  <p style="font-size:13px;color:#888;margin-bottom:8px;">El cliente firma con el dedo:</p>
  <div class="canvas-wrap">
    <canvas id="sigCanvas"></canvas>
  </div>
  <button class="clear-sig" onclick="clearSig()"><i class="ti ti-trash"></i> Limpiar firma</button>
  <button class="btn-primary" onclick="saveVisit()" style="margin-top:1rem">Guardar y sincronizar</button>
  <button class="btn-secondary" onclick="goScreen('screen-client-detail')">Cancelar</button>
</div>

<div id="screen-visit-detail" class="screen">
  <div class="header">
    <button class="back-btn" onclick="goScreen('screen-client-detail')"><i class="ti ti-arrow-left"></i></button>
    <h1>Detalle de visita</h1>
  </div>
  <div id="visit-detail-content"></div>
  <button class="btn-secondary" onclick="editVisit()" style="margin-top:1rem"><i class="ti ti-edit"></i> Editar visita</button>
  <button class="btn-secondary" onclick="exportVisitTxt()"><i class="ti ti-download"></i> Exportar resumen .txt</button>
  <button class="btn-danger" onclick="deleteVisit()"><i class="ti ti-trash"></i> Eliminar visita</button>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzhTc51cPWYNrNOqQZqpDRjm4bFfQIMWQSqUyaJV6R_Gh527dIlepWnWA5rYTr6cpf0dw/exec';

let db = JSON.parse(localStorage.getItem('lj_db') || '{"clients":[],"visits":[]}');
let currentClientId=null, currentVisitId=null, editingClientId=null, editingVisitId=null;
let visitPhotos=[], sigCtx, sigDrawing=false, sigHasContent=false;
let sigW=380, sigH=160;

function saveDb(){localStorage.setItem('lj_db', JSON.stringify(db));}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function showSyncStatus(msg, type='info'){
  const el=document.getElementById('sync-status');
  if(!msg){el.innerHTML='';return;}
  el.innerHTML=`<div class="sync-bar ${type}"><i class="ti ti-${type==='success'?'check':'${type==='error'?'alert-circle':'cloud-upload'}'}" ></i>${msg}</div>`;
  if(type==='success') setTimeout(()=>{el.innerHTML='';},3000);
}

async function syncToSheets(data){
  try {
    await fetch(SHEET_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(data)
    });
    return true;
  } catch(e){
    return false;
  }
}

function goScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  if(id==='screen-home'){updateStats();renderClients();}
  if(id==='screen-client-detail') renderClientDetail();
  if(id==='screen-new-visit') initSig();
}

function updateStats(){
  document.getElementById('total-clients').textContent=db.clients.length;
  document.getElementById('total-visits').textContent=db.visits.length;
}

function renderClients(){
  const q=document.getElementById('search-input').value.toLowerCase();
  const list=document.getElementById('client-list');
  const filtered=db.clients.filter(c=>
    c.nombre.toLowerCase().includes(q)||
    (c.direccion||'').toLowerCase().includes(q)||
    (c.telefono||'').includes(q)
  );
  if(!filtered.length){
    list.innerHTML=`<div class="empty-state"><i class="ti ti-users"></i><p>${q?'Sin resultados':'Aún no tienes clientes.<br>Toca + para agregar el primero.'}</p></div>`;
    return;
  }
  list.innerHTML=filtered.map(c=>{
    const visits=db.visits.filter(v=>v.clientId===c.id);
    const last=visits.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha))[0];
    return`<div class="client-card" onclick="openClient('${c.id}')">
      <div class="client-name">${c.nombre}</div>
      <div class="client-meta"><i class="ti ti-map-pin" style="font-size:12px"></i> ${c.direccion||'Sin dirección'}</div>
      <div class="client-meta"><i class="ti ti-phone" style="font-size:12px"></i> ${c.telefono||'Sin teléfono'}</div>
      <span class="badge">${c.tipo||'Sin tipo'}</span>
      <span class="badge">${visits.length} visita${visits.length!==1?'s':''}</span>
      ${last?`<span class="badge">Última: ${formatDate(last.fecha)}</span>`:''}
      ${c.synced?'<span class="badge synced"><i class="ti ti-cloud" style="font-size:10px"></i> Sincronizado</span>':''}
    </div>`;
  }).join('');
}

function openClient(id){currentClientId=id; goScreen('screen-client-detail');}

function renderClientDetail(){
  const c=db.clients.find(x=>x.id===currentClientId); if(!c)return;
  document.getElementById('client-detail-name').textContent=c.nombre;
  document.getElementById('client-detail-info').innerHTML=`
    <div class="detail-row"><span class="detail-label"><i class="ti ti-phone"></i> Teléfono</span><span class="detail-value">${c.telefono||'—'}</span></div>
    <div class="detail-row"><span class="detail-label"><i class="ti ti-map-pin"></i> Dirección</span><span class="detail-value">${c.direccion||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Tipo de aire</span><span class="detail-value">${c.tipo||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Marca</span><span class="detail-value">${c.marca||'—'}</span></div>
    <div class="detail-row"><span class="detail-label">BTU</span><span class="detail-value">${c.btu||'—'}</span></div>`;
  const visits=db.visits.filter(v=>v.clientId===currentClientId).sort((a,b)=>new Date(b.fecha)-new Date(a.fecha));
  const vlist=document.getElementById('visit-list');
  if(!visits.length){vlist.innerHTML=`<div class="empty-state" style="padding:2rem 1rem"><i class="ti ti-calendar"></i><p>Sin visitas aún.</p></div>`;return;}
  vlist.innerHTML=visits.map((v,i)=>`
    <div class="visit-card" onclick="openVisit('${v.id}')">
      <div class="visit-num">Visita ${visits.length-i}</div>
      <div class="visit-tipo">${v.tipo}</div>
      <div class="visit-fecha">${formatDate(v.fecha)}</div>
      ${v.observacion?`<div style="font-size:13px;color:#888;margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${v.observacion}</div>`:''}
      <div style="margin-top:6px;">
        ${v.firma?'<span class="badge signed"><i class="ti ti-writing" style="font-size:11px"></i> Firmado</span>':''}
        ${v.fotos&&v.fotos.length?`<span class="badge">${v.fotos.length} foto${v.fotos.length!==1?'s':''}</span>`:''}
        ${v.synced?'<span class="badge synced"><i class="ti ti-cloud" style="font-size:10px"></i> Guardado en Sheets</span>':''}
      </div>
    </div>`).join('');
}

function formatDate(d){if(!d)return'—';const[y,m,day]=d.split('-');return`${day}/${m}/${y}`;}

function goNewClient(){
  editingClientId=null;
  document.getElementById('new-client-title').textContent='Nuevo cliente';
  ['c-nombre','c-telefono','c-direccion','c-marca','c-btu'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('c-tipo').value='';
  goScreen('screen-new-client');
}

async function saveClient(){
  const nombre=document.getElementById('c-nombre').value.trim();
  if(!nombre){showToast('Ingresa el nombre del cliente');return;}
  if(editingClientId){
    const c=db.clients.find(x=>x.id===editingClientId);
    c.nombre=nombre;
    c.telefono=document.getElementById('c-telefono').value.trim();
    c.direccion=document.getElementById('c-direccion').value.trim();
    c.tipo=document.getElementById('c-tipo').value;
    c.marca=document.getElementById('c-marca').value.trim();
    c.btu=document.getElementById('c-btu').value.trim();
    c.synced=false;
    currentClientId=editingClientId; editingClientId=null;
    saveDb(); showToast('Guardando...');
    const ok=await syncToSheets({type:'client',...c});
    if(ok){c.synced=true;saveDb();showToast('Cliente actualizado y sincronizado ✓');}
    else showToast('Guardado local, sin internet');
    goScreen('screen-client-detail');
  } else {
    const c={
      id:'c_'+Date.now(), nombre,
      telefono:document.getElementById('c-telefono').value.trim(),
      direccion:document.getElementById('c-direccion').value.trim(),
      tipo:document.getElementById('c-tipo').value,
      marca:document.getElementById('c-marca').value.trim(),
      btu:document.getElementById('c-btu').value.trim(),
      creado:new Date().toISOString(), synced:false
    };
    db.clients.push(c); currentClientId=c.id;
    saveDb(); showToast('Guardando en Sheets...');
    const ok=await syncToSheets({type:'client',...c});
    if(ok){c.synced=true;saveDb();showToast('Cliente guardado en Sheets ✓');}
    else showToast('Guardado local, sin conexión');
    goScreen('screen-client-detail');
  }
}

function editClient(){
  const c=db.clients.find(x=>x.id===currentClientId);
  editingClientId=currentClientId;
  document.getElementById('new-client-title').textContent='Editar cliente';
  document.getElementById('c-nombre').value=c.nombre;
  document.getElementById('c-telefono').value=c.telefono||'';
  document.getElementById('c-direccion').value=c.direccion||'';
  document.getElementById('c-tipo').value=c.tipo||'';
  document.getElementById('c-marca').value=c.marca||'';
  document.getElementById('c-btu').value=c.btu||'';
  goScreen('screen-new-client');
}

function goNewVisit(){
  editingVisitId=null;
  document.getElementById('new-visit-title').textContent='Nueva visita';
  document.getElementById('v-fecha').value=new Date().toISOString().split('T')[0];
  document.getElementById('v-tipo').value='';
  document.getElementById('v-detalle').value='';
  document.getElementById('v-observacion').value='';
  visitPhotos=[]; renderPhotoGrid();
  goScreen('screen-new-visit');
}

function initSig(){
  const canvas=document.getElementById('sigCanvas');
  sigW=canvas.offsetWidth||380; canvas.width=sigW; canvas.height=sigH;
  sigCtx=canvas.getContext('2d');
  sigCtx.clearRect(0,0,sigW,sigH);
  sigCtx.strokeStyle='#1a1a1a'; sigCtx.lineWidth=2.5; sigCtx.lineCap='round'; sigCtx.lineJoin='round';
  sigHasContent=false;
  function getPos(e){
    const r=canvas.getBoundingClientRect();
    const scaleX=canvas.width/r.width, scaleY=canvas.height/r.height;
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-r.left)*scaleX, y:(src.clientY-r.top)*scaleY};
  }
  canvas.onmousedown=canvas.ontouchstart=e=>{e.preventDefault();sigDrawing=true;const p=getPos(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y);sigHasContent=true;};
  canvas.onmousemove=canvas.ontouchmove=e=>{e.preventDefault();if(!sigDrawing)return;const p=getPos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke();};
  canvas.onmouseup=canvas.ontouchend=()=>sigDrawing=false;
}

function clearSig(){if(sigCtx){sigCtx.clearRect(0,0,sigW,sigH);sigHasContent=false;}}

function addPhotos(input){
  Array.from(input.files).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{visitPhotos.push(e.target.result);renderPhotoGrid();};
    r.readAsDataURL(f);
  });
  input.value='';
}

function renderPhotoGrid(){
  const grid=document.getElementById('photo-grid');
  grid.innerHTML=visitPhotos.map((p,i)=>
    `<div style="position:relative;"><img src="${p}" class="photo-thumb" alt="Foto ${i+1}">
    <button onclick="removePhoto(${i})" style="position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.55);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;"><i class="ti ti-x"></i></button></div>`
  ).join('')+`<div class="photo-add" onclick="document.getElementById('photo-input').click()"><i class="ti ti-camera-plus"></i></div>`;
}

function removePhoto(i){visitPhotos.splice(i,1);renderPhotoGrid();}

async function saveVisit(){
  const tipo=document.getElementById('v-tipo').value;
  const fecha=document.getElementById('v-fecha').value;
  if(!tipo){showToast('Selecciona el tipo de servicio');return;}
  if(!fecha){showToast('Ingresa la fecha');return;}
  const firma=sigHasContent?document.getElementById('sigCanvas').toDataURL():null;
  if(editingVisitId){
    const v=db.visits.find(x=>x.id===editingVisitId);
    v.fecha=fecha; v.tipo=tipo;
    v.detalle=document.getElementById('v-detalle').value.trim();
    v.observacion=document.getElementById('v-observacion').value.trim();
    v.fotos=[...visitPhotos]; if(firma)v.firma=firma;
    v.synced=false; editingVisitId=null;
    saveDb(); showToast('Sincronizando...');
    const ok=await syncToSheets({type:'visit',...v});
    if(ok){v.synced=true;saveDb();showToast('Visita actualizada en Sheets ✓');}
    else showToast('Guardado local, sin conexión');
    goScreen('screen-client-detail');
  } else {
    const v={
      id:'v_'+Date.now(), clientId:currentClientId,
      fecha, tipo,
      detalle:document.getElementById('v-detalle').value.trim(),
      observacion:document.getElementById('v-observacion').value.trim(),
      fotos:[...visitPhotos], firma,
      creado:new Date().toISOString(), synced:false
    };
    db.visits.push(v); saveDb(); showToast('Sincronizando con Sheets...');
    const ok=await syncToSheets({type:'visit',...v});
    if(ok){v.synced=true;saveDb();showToast('Visita guardada en Sheets ✓');}
    else showToast('Guardado local, sin conexión');
    goScreen('screen-client-detail');
  }
}

function openVisit(id){
  currentVisitId=id;
  const v=db.visits.find(x=>x.id===id);
  const c=db.clients.find(x=>x.id===v.clientId);
  const visits=db.visits.filter(x=>x.clientId===v.clientId).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  const num=visits.findIndex(x=>x.id===id)+1;
  document.getElementById('visit-detail-content').innerHTML=`
    <div class="info-card">
      <div style="font-size:12px;color:#888;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:8px;">Visita ${num} — ${c.nombre}</div>
      <div class="detail-row"><span class="detail-label">Fecha</span><span class="detail-value">${formatDate(v.fecha)}</span></div>
      <div class="detail-row"><span class="detail-label">Servicio</span><span class="detail-value">${v.tipo}</span></div>
      <div class="detail-row"><span class="detail-label">Detalle</span><span class="detail-value">${v.detalle||'—'}</span></div>
      <div class="detail-row"><span class="detail-label">Observación</span><span class="detail-value">${v.observacion||'—'}</span></div>
      <div class="detail-row"><span class="detail-label">Sheets</span><span class="detail-value" style="color:${v.synced?'#1a7a4a':'#e53e3e'}">${v.synced?'✓ Sincronizado':'Pendiente'}</span></div>
    </div>
    ${v.fotos&&v.fotos.length?`<div class="section-title">Fotos (${v.fotos.length})</div><div class="photo-grid">${v.fotos.map((p,i)=>`<img src="${p}" class="photo-thumb" alt="Foto ${i+1}">`).join('')}</div>`:''}
    ${v.firma?`<div class="section-title">Firma del cliente</div><img src="${v.firma}" class="sig-preview" alt="Firma">`:'<p style="font-size:13px;color:#aaa;margin-top:1rem;">Sin firma registrada</p>'}`;
  goScreen('screen-visit-detail');
}

function editVisit(){
  const v=db.visits.find(x=>x.id===currentVisitId);
  editingVisitId=currentVisitId;
  document.getElementById('new-visit-title').textContent='Editar visita';
  document.getElementById('v-fecha').value=v.fecha;
  document.getElementById('v-tipo').value=v.tipo;
  document.getElementById('v-detalle').value=v.detalle||'';
  document.getElementById('v-observacion').value=v.observacion||'';
  visitPhotos=v.fotos?[...v.fotos]:[];
  renderPhotoGrid(); goScreen('screen-new-visit');
}

function deleteVisit(){
  if(!confirm('¿Eliminar esta visita? No se puede deshacer.'))return;
  db.visits=db.visits.filter(x=>x.id!==currentVisitId);
  saveDb(); showToast('Visita eliminada'); goScreen('screen-client-detail');
}

function exportVisitTxt(){
  const v=db.visits.find(x=>x.id===currentVisitId);
  const c=db.clients.find(x=>x.id===v.clientId);
  const visits=db.visits.filter(x=>x.clientId===v.clientId).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  const num=visits.findIndex(x=>x.id===currentVisitId)+1;
  const txt=`LLAMA A JHON — Reporte de visita\n${'='.repeat(40)}\nCLIENTE\nNombre:      ${c.nombre}\nTeléfono:    ${c.telefono||'—'}\nDirección:   ${c.direccion||'—'}\nTipo aire:   ${c.tipo||'—'}\nMarca:       ${c.marca||'—'}\nBTU:         ${c.btu||'—'}\n\nVISITA #${num}\nFecha:       ${formatDate(v.fecha)}\nServicio:    ${v.tipo}\nDetalle:     ${v.detalle||'—'}\nObservación: ${v.observacion||'—'}\nFirma:       ${v.firma?'Sí, firmado digitalmente':'No'}\nFotos:       ${v.fotos?v.fotos.length:0}\n\nGenerado por Llama a Jhon — ${new Date().toLocaleDateString('es-EC')}`;
  const blob=new Blob([txt],{type:'text/plain'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`reporte_${c.nombre.replace(/ /g,'_')}_visita${num}_${v.fecha}.txt`;
  a.click(); showToast('Reporte exportado ✓');
}

updateStats(); renderClients();
</script>
</body>
</html>
