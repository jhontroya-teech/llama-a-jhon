<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu tarjeta de fidelidad - Llama a Jhon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  body {
    margin: 0;
    font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background: #F1FBF6;
    display: flex;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }
  .wrap { width: 380px; max-width: 100%; }
  .card {
    border-radius: 24px;
    padding: 26px 22px 20px;
    background: linear-gradient(135deg, #0a6e4a 0%, #0d8a5f 55%, #34C38F 100%);
    box-shadow: 0 10px 30px rgba(10,110,74,0.25);
    color: #fff;
  }
  .header-row { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
  .ciclos-badge {
    width: 30px; height: 30px; border-radius: 50%; background: #FAC775; color: #6e4c00;
    display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800;
    flex-shrink: 0; box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  .logo-wrap {
    width: 56px; height: 56px; border-radius: 50%; background: #fff; border: 3px solid rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    font-size: 24px; color: #0a6e4a; flex-shrink: 0;
  }
  .bienvenida { font-size: 21px; font-weight: 700; line-height: 1.3; }
  h1 { font-size: 16px; line-height: 1.4; margin: 0 0 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  h1 i { font-size: 18px; }
  .beneficio-sub { font-size: 13px; line-height: 1.5; margin: 0 0 14px; opacity: 0.95; }
  .beneficio-precios { font-size: 12px; font-weight: 700; letter-spacing: 0.3px; margin: 0 0 8px; text-transform: uppercase; opacity: 0.9; }
  .lista-precios { list-style: none; margin: 0 0 14px; padding: 0; font-size: 13px; line-height: 2; }
  .lista-precios li { display: flex; justify-content: space-between; gap: 8px; border-bottom: 1px dashed rgba(255,255,255,0.3); padding: 5px 0; }
  .lista-precios b { font-weight: 700; }
  .beneficio-ahorro { opacity: 0.85; font-size: 12px; }
  .divisor { border-top: 1px solid rgba(255,255,255,0.35); margin: 0 0 14px; }
  .beneficio-condicion { font-size: 11px; line-height: 1.5; opacity: 0.9; margin: 0 0 22px; display: flex; align-items: flex-start; gap: 6px; }
  .beneficio-condicion i { font-size: 14px; color: #FAC775; flex-shrink: 0; margin-top: 1px; }
  .stamps { display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
  .stamp {
    width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    border: 2px solid rgba(255,255,255,0.5);
  }
  .stamp.filled { background: #378ADD; border-color: #378ADD; }
  .stamp.filled i { color: #E6F1FB; font-size: 22px; }
  .stamp i { font-size: 20px; color: rgba(255,255,255,0.6); }
  .progreso-texto { font-size: 12px; opacity: 0.9; margin-bottom: 18px; }
  .footer { display: flex; gap: 10px; flex-wrap: wrap; }
  .pill {
    background: rgba(255,255,255,0.2); color: #fff; font-size: 13px; font-weight: 600;
    padding: 8px 14px; border-radius: 20px; text-decoration: none; display: flex; align-items: center; gap: 6px;
  }
  .pill:active { opacity: 0.75; }
  .reward-banner {
    margin-top: 16px; background: rgba(255,255,255,0.95); border: 2px dashed #fff;
    border-radius: 14px; padding: 12px 14px; text-align: center; display: none;
  }
  .reward-banner.show { display: block; }
  .reward-banner p { margin: 0; font-size: 14px; color: #0a6e4a; font-weight: bold; }

  .historial {
    background: #fff; border-radius: 16px; margin-top: 14px; padding: 16px 18px;
    box-shadow: 0 4px 14px rgba(10,110,74,0.08);
  }
  .historial h3 { font-size: 14px; margin: 0 0 12px; color: #2c2c2c; }
  .servicio {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid #f0f4f2; font-size: 13px; gap: 10px;
  }
  .servicio:last-child { border-bottom: none; }
  .servicio .row-left { display: flex; align-items: flex-start; flex: 1; min-width: 0; }
  .servicio .num {
    width: 24px; height: 24px; border-radius: 50%; background: #34C38F; color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
    margin-right: 10px; flex-shrink: 0;
  }
  .servicio .info { flex: 1; min-width: 0; }
  .servicio .detalle { font-weight: 600; color: #2c2c2c; }
  .servicio .fecha { font-size: 11px; color: #918a9e; margin-top: 2px; }
  .promo-tag {
    font-size: 11px; font-weight: 700; color: #0a6e4a; background: #E7F8EE;
    display: inline-block; padding: 3px 8px; border-radius: 8px; margin-top: 4px;
  }
  .btn-pdf {
    flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%; background: #E7F8EE; color: #0a6e4a;
    display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 16px;
  }
  .btn-pdf.disabled { opacity: 0.35; pointer-events: none; }
  .estado { text-align: center; font-size: 13px; color: #877f95; padding: 30px 0; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="estado" id="cargando">Cargando tu tarjeta...</div>
</div>

<script>
const META = 2;
const INSTAGRAM_URL = "https://instagram.com/llama.a.jhon";
const WHATSAPP_URL = "https://wa.me/593987738569";

const params = new URLSearchParams(window.location.search);
const clienteId = params.get('id');

// Mismo Apps Script que usa el panel de Llama a Jhon (LJ_SHEET_URL en index.html)
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxXfHV1R6EnHSgSjAUEXsiUlBDS2waT1gEVOdaiYK-fumkNxGmXoM-oicUqiuhBL_pMcw/exec';

async function cargarTarjeta() {
  const app = document.getElementById('app');
  if (!clienteId) {
    app.innerHTML = '<div class="estado">Falta el identificador del cliente en el link.</div>';
    return;
  }
  try {
    const resp = await fetch(SCRIPT_URL + '?action=tarjeta&id=' + encodeURIComponent(clienteId));
    const data = await resp.json();
    if (!data.success) {
      app.innerHTML = '<div class="estado">No se encontró tu tarjeta. Contacta a @llama.a.jhon.</div>';
      return;
    }
    renderTarjeta(data);
  } catch (err) {
    app.innerHTML = '<div class="estado">No se pudo cargar tu tarjeta. Intenta de nuevo.</div>';
  }
}

function renderTarjeta(data) {
  const totalServicios = Number(data.totalSellos) || 0;
  // Ciclo completo = META sellos (mantenimientos normales) + 1 mantenimiento de promoción
  // (el que usa el descuento ganado). Tras ese mantenimiento de promoción, los sellos vuelven a 0.
  const CICLO = META + 1;
  const posEnCiclo = totalServicios % CICLO; // 0 = justo se usó la promo y se reinició
  const selloEnCiclo = posEnCiclo === 0 ? 0 : Math.min(posEnCiclo, META);
  const esperandoPromocion = posEnCiclo === 0 && totalServicios > 0 ? false : posEnCiclo >= META;
  const ciclosCompletados = Math.floor(totalServicios / CICLO);

  let stampsHtml = '';
  for (let i = 0; i < META; i++) {
    if (i < selloEnCiclo) {
      stampsHtml += '<div class="stamp filled"><i class="ti ti-check"></i></div>';
    } else {
      stampsHtml += '<div class="stamp"><i class="ti ti-air-conditioning"></i></div>';
    }
  }

  let historialHtml = '';
  if (data.historial && data.historial.length) {
    // Recorremos en orden cronológico (mas antiguo primero) para llevar la cuenta
    // real de sellos: solo suma cuando la visita SI cuenta como sello (s.cuentaSello),
    // no por su posición en la lista (así "Reparación", "Instalación", etc. no rompen el ciclo)
    let selloCounter = 0;
    const historialConPromo = data.historial.map(s => {
      let esPromocion = false;
      if (s.cuentaSello) {
        selloCounter++;
        esPromocion = selloCounter % CICLO === 0;
      }
      return Object.assign({}, s, { esPromocion: esPromocion });
    });

    historialConPromo.slice().reverse().forEach((s, idx) => {
      const numVisita = historialConPromo.length - idx; // posición general en el listado (solo para mostrar el #)
      const pdfBtn = s.link_reporte
        ? '<a class="btn-pdf" href="' + s.link_reporte + '" target="_blank" rel="noopener" title="Descargar PDF"><i class="ti ti-file-type-pdf"></i></a>'
        : '<span class="btn-pdf disabled" title="Reporte no disponible"><i class="ti ti-file-type-pdf"></i></span>';
      const etiquetaPromo = s.esPromocion
        ? '<div class="promo-tag">🎁 Limpieza Promoción</div>'
        : '';
      historialHtml += '<div class="servicio"><div class="row-left"><div class="num">' + numVisita + '</div><div class="info"><div class="detalle">' + (s.tipo || 'Servicio') + '</div><div class="fecha">' + (s.fecha || '') + '</div>' + etiquetaPromo + '</div></div>' + pdfBtn + '</div>';
    });
  } else {
    historialHtml = '<div class="servicio">Aún no hay servicios registrados.</div>';
  }

  document.getElementById('app').innerHTML =
    '<div class="card">' +
      '<div class="header-row">'+
        '<div class="logo-wrap"><i class="ti ti-air-conditioning"></i></div>'+
        '<div class="bienvenida" style="flex:1;">Bienvenido/a<br>' + (data.nombre || '') + '</div>'+
        (ciclosCompletados > 0 ? '<div class="ciclos-badge" title="Veces que ha completado su tarjeta">' + ciclosCompletados + '</div>' : '') +
      '</div>' +
      '<h1>¡Gracias por tu confianza! <i class="ti ti-snowflake"></i></h1>' +
      '<div class="beneficio-sub">Al completar tus 2 sellos, accede a tu beneficio de <b>CLIENTE FIEL</b>:</div>' +
      '<div class="beneficio-precios">Precios exclusivos en una sola visita</div>' +
      '<ul class="lista-precios">' +
        '<li><span>1 Aire</span> <b>$20</b> <span class="beneficio-ahorro">(Ahorras $5)</span></li>' +
        '<li><span>3 Aires</span> <b>$55</b> <span class="beneficio-ahorro">(Ahorras $10)</span></li>' +
        '<li><span>5 Aires</span> <b>$85</b> <span class="beneficio-ahorro">(Ahorras $15)</span></li>' +
      '</ul>' +
      '<div class="divisor"></div>' +
      '<div class="beneficio-condicion"><i class="ti ti-alert-triangle"></i><span>Condición: precios válidos únicamente para servicios realizados el mismo día y en el mismo domicilio.</span></div>' +
      '<div class="stamps">' + stampsHtml + '</div>' +
      '<div class="progreso-texto">' + (esperandoPromocion
        ? '¡Tarjeta completa! Tu próximo mantenimiento es tu Limpieza Promoción 🎁'
        : selloEnCiclo + ' de ' + META + ' sellos en tu tarjeta actual') + '</div>' +
      '<div class="footer">' +
        '<a class="pill" href="' + INSTAGRAM_URL + '" target="_blank" rel="noopener"><i class="ti ti-brand-instagram"></i> @llama.a.jhon</a>' +
        '<a class="pill" href="' + WHATSAPP_URL + '" target="_blank" rel="noopener"><i class="ti ti-brand-whatsapp"></i> 0987738569</a>' +
      '</div>' +
      '<div class="reward-banner ' + (esperandoPromocion ? 'show' : '') + '">' +
        '<p>¡Completaste tu tarjeta! Ya tienes acceso a tus precios exclusivos de Cliente Fiel.</p>' +
      '</div>' +
    '</div>' +
    '<div class="historial">' +
      '<h3>Tu historial de servicios</h3>' +
      historialHtml +
    '</div>';
}

cargarTarjeta();
</script>
</body>
</html>
