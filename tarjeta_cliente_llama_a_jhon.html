<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tu tarjeta de fidelidad - Llama a Jhon</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  body {
    margin: 0;
    font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background: #F1FBF6;
    display: flex;
    justify-content: center;
    padding: 20px;
    box-sizing: border-box;
  }
  .wrap { width: 380px; max-width: 100%; }
  .card {
    border-radius: 24px;
    padding: 24px 20px 18px;
    background: linear-gradient(135deg, #0a6e4a 0%, #0d8a5f 55%, #34C38F 100%);
    box-shadow: 0 10px 30px rgba(10,110,74,0.25);
    color: #fff;
  }
  .logo-wrap {
    width: 64px; height: 64px; border-radius: 50%; background: #fff; border: 3px solid rgba(255,255,255,0.85);
    display: flex; align-items: center; justify-content: center; margin-bottom: 12px; overflow: hidden;
    font-size: 26px; color: #0a6e4a;
  }
  h1 { font-size: 17px; line-height: 1.4; margin: 4px 0 4px; font-weight: 700; }
  .cliente-nombre { font-size: 13px; opacity: 0.85; margin-bottom: 16px; }
  .stamps { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .stamp {
    width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    border: 2px solid rgba(255,255,255,0.5);
  }
  .stamp.filled { background: #fff; border-color: #fff; }
  .stamp img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
  .stamp i { font-size: 20px; color: rgba(255,255,255,0.6); }
  .progreso-texto { font-size: 12px; opacity: 0.9; margin-bottom: 14px; }
  .footer { display: flex; gap: 10px; flex-wrap: wrap; }
  .pill {
    background: rgba(255,255,255,0.2); color: #fff; font-size: 13px; font-weight: 600;
    padding: 7px 14px; border-radius: 20px; text-decoration: none; display: flex; align-items: center; gap: 6px;
  }
  .pill:active { opacity: 0.75; }
  .reward-banner {
    margin-top: 16px; background: rgba(255,255,255,0.95); border: 2px dashed #fff;
    border-radius: 14px; padding: 12px 14px; text-align: center; display: none;
  }
  .reward-banner.show { display: block; }
  .reward-banner p { margin: 0; font-size: 14px; color: #0a6e4a; font-weight: bold; }

  .historial {
    background: #fff; border-radius: 16px; margin-top: 14px; padding: 16px 18px;
    box-shadow: 0 4px 14px rgba(10,110,74,0.08);
  }
  .historial h3 { font-size: 14px; margin: 0 0 12px; color: #2c2c2c; }
  .servicio {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid #f0f4f2; font-size: 13px; gap: 10px;
  }
  .servicio:last-child { border-bottom: none; }
  .servicio .row-left { display: flex; align-items: flex-start; flex: 1; min-width: 0; }
  .servicio .num {
    width: 24px; height: 24px; border-radius: 50%; background: #34C38F; color: #fff;
    display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
    margin-right: 10px; flex-shrink: 0;
  }
  .servicio .info { flex: 1; min-width: 0; }
  .servicio .detalle { font-weight: 600; color: #2c2c2c; }
  .servicio .fecha { font-size: 11px; color: #918a9e; margin-top: 2px; }
  .btn-pdf {
    flex-shrink: 0; width: 34px; height: 34px; border-radius: 50%; background: #E7F8EE; color: #0a6e4a;
    display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 16px;
  }
  .btn-pdf.disabled { opacity: 0.35; pointer-events: none; }
  .estado { text-align: center; font-size: 13px; color: #877f95; padding: 30px 0; }
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="estado" id="cargando">Cargando tu tarjeta...</div>
</div>

const META = 4;
const INSTAGRAM_URL = "https://instagram.com/llama.a.jhon";
const WHATSAPP_URL = "https://wa.me/593987738569";

const params = new URLSearchParams(window.location.search);
const clienteId = params.get('id');

// Mismo Apps Script que usa el panel de Llama a Jhon (LJ_SHEET_URL en index.html)
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyZ6YNptYhd1qgIpwpiqN-SU_JiPnwdVuqeuIotDRKf1H_TH_b4DBl2nH8T6fIdPyHI/exec';

async function cargarTarjeta() {
  const app = document.getElementById('app');
  if (!clienteId) {
    app.innerHTML = '<div class="estado">Falta el identificador del cliente en el link.</div>';
    return;
  }
  try {
    const resp = await fetch(SCRIPT_URL + '?action=tarjeta&id=' + encodeURIComponent(clienteId));
    const data = await resp.json();
    if (!data.success) {
      app.innerHTML = '<div class="estado">No se encontró tu tarjeta. Contacta a @llama.a.jhon.</div>';
      return;
    }
    renderTarjeta(data);
  } catch (err) {
    app.innerHTML = '<div class="estado">No se pudo cargar tu tarjeta. Intenta de nuevo.</div>';
  }
}

function renderTarjeta(data) {
  const totalServicios = Number(data.totalSellos) || 0;
  // Sellos dentro del ciclo actual (cada 4 servicios se completa una tarjeta)
  const selloEnCiclo = totalServicios > 0 && totalServicios % META === 0 ? META : totalServicios % META;

  let stampsHtml = '';
  for (let i = 0; i < META; i++) {
    if (i < selloEnCiclo) {
      stampsHtml += '<div class="stamp filled"><img src="' + FACE + '"></div>';
    } else {
      stampsHtml += '<div class="stamp"><i class="ti ti-air-conditioning"></i></div>';
    }
  }

  let historialHtml = '';
  if (data.historial && data.historial.length) {
    data.historial.slice().reverse().forEach((s, idx) => {
      const pdfBtn = s.link_reporte
        ? '<a class="btn-pdf" href="' + s.link_reporte + '" target="_blank" rel="noopener" title="Descargar PDF"><i class="ti ti-file-type-pdf"></i></a>'
        : '<span class="btn-pdf disabled" title="Reporte no disponible"><i class="ti ti-file-type-pdf"></i></span>';
      historialHtml += '<div class="servicio"><div class="row-left"><div class="num">' + (data.historial.length - idx) + '</div><div class="info"><div class="detalle">' + (s.tipo || 'Servicio') + '</div><div class="fecha">' + (s.fecha || '') + '</div></div></div>' + pdfBtn + '</div>';
    });
  } else {
    historialHtml = '<div class="servicio">Aún no hay servicios registrados.</div>';
  }

  document.getElementById('app').innerHTML =
    '<div class="card">' +
      '<div class="logo-wrap"><i class="ti ti-air-conditioning"></i></div>' +
      '<h1>Cliente fiel: 50% de descuento en tu segundo mantenimiento de aire acondicionado al completar 4 sellos.</h1>' +
      '<div class="cliente-nombre">' + (data.nombre || '') + '</div>' +
      '<div class="stamps">' + stampsHtml + '</div>' +
      '<div class="progreso-texto">' + selloEnCiclo + ' de ' + META + ' sellos en tu tarjeta actual</div>' +
      '<div class="footer">' +
        '<a class="pill" href="' + INSTAGRAM_URL + '" target="_blank" rel="noopener"><i class="ti ti-brand-instagram"></i> @llama.a.jhon</a>' +
        '<a class="pill" href="' + WHATSAPP_URL + '" target="_blank" rel="noopener"><i class="ti ti-brand-whatsapp"></i> 0987738569</a>' +
      '</div>' +
      '<div class="reward-banner ' + (selloEnCiclo >= META ? 'show' : '') + '">' +
        '<p>¡Completaste tu tarjeta! Tienes 50% de descuento en tu próximo mantenimiento de aire acondicionado.</p>' +
      '</div>' +
    '</div>' +
    '<div class="historial">' +
      '<h3>Tu historial de servicios</h3>' +
      historialHtml +
    '</div>';
}

cargarTarjeta();
</script>
